<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>デカブサ大戦 5対5版</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif}
body{min-height:100svh;overflow-x:hidden}
[hidden]{display:none!important}
.bg{position:fixed;inset:0;z-index:0;background:#000 center/cover no-repeat;filter:blur(18px) brightness(.42);transform:scale(1.08)}
.bgShade{position:fixed;inset:0;z-index:0;background:radial-gradient(circle at 50% 8%, rgba(255,255,255,.08), transparent 28%),linear-gradient(180deg, rgba(0,0,0,.16), rgba(0,0,0,.36) 45%, rgba(0,0,0,.62))}
.app{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:12px 12px 28px}
.card{background:linear-gradient(180deg,rgba(18,18,18,.78),rgba(10,10,10,.74));border:1px solid rgba(255,255,255,.12);border-radius:18px;box-shadow:0 8px 24px rgba(0,0,0,.35);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.title{font-size:30px;font-weight:900;text-align:center;margin:8px 0 4px;letter-spacing:.06em;text-shadow:0 4px 16px rgba(0,0,0,.38)}
.sub{text-align:center;font-size:13px;color:rgba(255,255,255,.78);margin-bottom:14px}
.btn{width:100%;border:none;border-radius:14px;padding:15px 14px;font-size:18px;font-weight:900;background:#fff;color:#000}
.btnGhost{width:100%;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:900;background:rgba(22,22,25,.84);color:#fff;border:1px solid rgba(255,255,255,.12)}
.topBtns{display:flex;gap:10px}
.section{padding:14px;margin-bottom:12px}
.sectionTitle{font-size:18px;font-weight:900;margin-bottom:10px}
.muted{color:rgba(255,255,255,.72)}
.modeRow,.girlRow{display:flex;gap:8px;flex-wrap:wrap}
.modeBtn,.girlBtn,.speedBtn{flex:1;min-width:90px;border:none;border-radius:12px;padding:12px 10px;background:#262626;color:#fff;border:1px solid rgba(255,255,255,.12);font-size:13px;font-weight:900}
.modeBtn.active,.girlBtn.active,.speedBtn.active{background:#fff;color:#000}
.pickGrid{display:grid;grid-template-columns:1fr;gap:10px}
.pickCard{padding:10px;display:grid;grid-template-columns:88px 1fr;gap:10px;align-items:stretch;border:1px solid rgba(255,255,255,.12);border-radius:16px;background:rgba(10,10,10,.4)}
.pickCard.selected{outline:2px solid rgba(255,255,255,.72)}
.pickImgWrap{display:flex;align-items:flex-end;justify-content:center;background:rgba(255,255,255,.03);border-radius:12px}
.pickImg{width:100%;height:112px;object-fit:contain;filter:drop-shadow(0 8px 18px rgba(0,0,0,.45))}
.pickName{font-size:20px;font-weight:900}
.pickMeta{font-size:12px;color:#cbd7ff;margin-top:2px}
.pickStats{font-size:12px;color:#ddd;line-height:1.45;margin-top:5px}
.pickPassive{font-size:12px;line-height:1.45;margin-top:6px;color:#eee}
.pickActions{display:flex;gap:6px;margin-top:8px}
.pickActions button{flex:1;border:none;border-radius:10px;padding:9px 6px;font-weight:900;font-size:12px}
.pickMain{background:#fff;color:#000}
.pickSub{background:#333;color:#fff}
.teamList{display:flex;flex-direction:column;gap:8px}
.teamSlot{display:grid;grid-template-columns:54px 1fr 64px;gap:10px;align-items:center;padding:10px;border:1px solid rgba(255,255,255,.12);border-radius:14px;background:rgba(255,255,255,.03)}
.slotThumb{width:54px;height:54px;border-radius:12px;object-fit:contain;background:rgba(0,0,0,.2)}
.slotName{font-size:15px;font-weight:900}
.slotMeta{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.slotBtns{display:flex;flex-direction:column;gap:6px}
.slotBtns button{border:none;border-radius:10px;padding:7px 0;background:#2b2b2b;color:#fff;font-weight:900;font-size:12px}
.slotBtns button:disabled{opacity:.28}
.girlPreview{display:flex;gap:12px;align-items:center}
.girlPreview img{width:78px;height:78px;object-fit:contain;filter:drop-shadow(0 8px 18px rgba(0,0,0,.35))}
.girlPreviewText{font-size:14px;line-height:1.7;white-space:pre-line}
.boardWrap{position:relative;margin-bottom:12px}
.board{padding:12px}
.boardHead,.boardRow{display:grid;grid-template-columns:1fr 42px 1fr;gap:8px;align-items:center}
.boardHead{margin-bottom:8px}
.boardRows{display:flex;flex-direction:column;gap:6px}
.mini{min-height:58px;padding:8px;border:1px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.04);display:grid;grid-template-columns:40px 1fr auto;gap:8px;align-items:center}
.mini.right{grid-template-columns:auto 1fr 40px}
.mini img{width:40px;height:40px;border-radius:10px;object-fit:contain;background:rgba(0,0,0,.18)}
.mini.player img{transform:scaleX(-1)}
.mini.dead{opacity:.24;filter:grayscale(1)}
.mini.active{outline:2px solid rgba(255,255,255,.72)}
.miniName{font-size:12px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.miniMeta{font-size:10px;color:rgba(255,255,255,.68)}
.boardLink{height:2px;background:rgba(255,255,255,.18);border-radius:999px}
.boardLink.active{background:rgba(255,255,255,.86)}
.flash{margin:6px 0 12px;text-align:center;font-size:18px;font-weight:900;padding:10px;border-radius:14px;opacity:0;transform:translateY(-6px) scale(.98);transition:.18s ease}
.rowBattle{display:grid;grid-template-columns:1fr 56px 1fr;gap:10px;align-items:stretch}
.vs{display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900}
.fighter{border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:14px;min-height:286px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.fighter.player{background:radial-gradient(circle at 30% 20%, rgba(90,220,130,.18), transparent 42%), linear-gradient(180deg,rgba(15,52,30,.74),rgba(8,18,12,.8))}
.fighter.enemy{background:radial-gradient(circle at 30% 20%, rgba(90,150,255,.18), transparent 42%), linear-gradient(180deg,rgba(12,31,60,.76),rgba(8,14,26,.82))}
.fName{font-size:24px;font-weight:900}
.fRole{font-size:14px;color:#cbd7ff;margin-top:4px}
.fBody{flex:1;display:flex;align-items:flex-end;justify-content:center;position:relative;min-height:148px;padding:6px 0}
.fImg{max-width:100%;max-height:148px;object-fit:contain;filter:drop-shadow(0 10px 18px rgba(0,0,0,.45))}
.player .fImg{transform:scaleX(-1)}
.hpRow{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.hpBar{height:12px;background:#2a2a2a;border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.hpFill{height:100%;width:100%;background:#77e0a0;transition:width .35s ease}
.enemyFill{background:#6db5ff}
.live{margin:10px 0;padding:12px;border-radius:14px;background:linear-gradient(180deg,rgba(20,20,20,.76),rgba(10,10,10,.72));border:1px solid rgba(255,255,255,.12);font-size:18px;font-weight:900;min-height:56px;display:flex;align-items:center;justify-content:center;text-align:center}
.log{max-height:28svh;overflow:auto;padding:12px}
.logLine{font-size:13px;line-height:1.6;padding:4px 0;border-bottom:1px dashed rgba(255,255,255,.06)}
.bubble{position:absolute;top:2px;max-width:128px;padding:8px 10px;border-radius:12px;background:rgba(255,255,255,.96);color:#111;font-size:12px;font-weight:900;line-height:1.35;box-shadow:0 6px 18px rgba(0,0,0,.28);z-index:3}
.bubble.left{left:0}.bubble.right{right:0}
.bubble.left:after{content:"";position:absolute;left:18px;bottom:-8px;border-width:8px 7px 0 7px;border-style:solid;border-color:rgba(255,255,255,.96) transparent transparent transparent}
.bubble.right:after{content:"";position:absolute;right:18px;bottom:-8px;border-width:8px 7px 0 7px;border-style:solid;border-color:rgba(255,255,255,.96) transparent transparent transparent}
.damageText{position:absolute;top:18px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:900;text-shadow:0 2px 10px rgba(0,0,0,.6);z-index:4;pointer-events:none}
.commentary{display:flex;gap:12px;align-items:center;padding:12px}
.commentary img{width:82px;height:82px;object-fit:contain;filter:drop-shadow(0 8px 18px rgba(0,0,0,.35))}
.commentaryText{font-size:14px;line-height:1.7;white-space:pre-line}
.overlay{position:fixed;inset:0;background:#000;display:flex;align-items:stretch;justify-content:center;z-index:1000}
.fullCutin{width:100%;height:100%;position:relative;overflow:hidden;background:#000}
.fullCutinBg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.fullShade{position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,0,0,.22), rgba(0,0,0,.10) 30%, rgba(0,0,0,.22) 58%, rgba(0,0,0,.72))}
.fullTop{position:absolute;top:max(18px, env(safe-area-inset-top));left:0;right:0;text-align:center;font-size:14px;font-weight:900;color:#ffd95e;letter-spacing:.08em;z-index:2}
.dialogWrap{position:absolute;left:14px;right:14px;bottom:152px;z-index:2}
.dialogBox{border-radius:24px;padding:16px 16px 14px;background:rgba(0,0,0,.56);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.16);box-shadow:0 18px 48px rgba(0,0,0,.28)}
.fullBadge{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:8px 16px;border-radius:999px;background:rgba(0,0,0,.62);font-size:18px;font-weight:900}
.fullText{margin-top:14px;font-size:18px;line-height:1.78;white-space:pre-line;text-shadow:0 2px 10px rgba(0,0,0,.26)}
.systemBox{position:absolute;left:14px;right:14px;bottom:max(12px, env(safe-area-inset-bottom));z-index:2;border-radius:18px;padding:14px;background:rgba(10,10,12,.82);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 12px 30px rgba(0,0,0,.35)}
.systemPromptText{font-size:15px;line-height:1.45;text-align:center;color:rgba(255,255,255,.92);margin-bottom:12px}
.systemBtns{display:flex;gap:10px}
.systemBtns button{flex:1;height:54px;border-radius:16px;font-size:18px;font-weight:900;border:none}
.systemCancel{background:#1c1c1f;color:#fff;border:1px solid rgba(255,255,255,.14)}
.systemOk{background:#fff;color:#000}
.mvpCard{width:min(94vw,520px);max-height:92svh;overflow:auto;border-radius:24px;background:radial-gradient(circle at 50% 0%, rgba(255,255,255,.10), transparent 38%), linear-gradient(180deg,#1b1b1d,#111113);border:1px solid rgba(255,255,255,.16);box-shadow:0 18px 48px rgba(0,0,0,.45);padding:18px;text-align:center}
.cutTop{font-size:14px;font-weight:900;color:#ffd95e;letter-spacing:.08em}
.cutImgWrap{min-height:300px;display:flex;align-items:center;justify-content:center;margin-top:6px}
.cutImg{max-width:100%;max-height:46svh;object-fit:contain;filter:drop-shadow(0 18px 36px rgba(0,0,0,.45))}
.cutName{font-size:34px;font-weight:900;margin-top:4px}
.cutText{margin-top:12px;font-size:18px;line-height:1.8;white-space:pre-line}
.mvpStats{font-size:15px;line-height:1.7;color:#ddd;white-space:pre-line;margin-top:10px}
@keyframes hitLeft{0%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(3px)}100%{transform:translateX(0)}}
@keyframes hitRight{0%{transform:translateX(0)}20%{transform:translateX(10px)}40%{transform:translateX(-8px)}60%{transform:translateX(5px)}80%{transform:translateX(-3px)}100%{transform:translateX(0)}}
@keyframes atkPlayer{0%{transform:translateX(0) scaleX(-1)}50%{transform:translateX(24px) scale(1.05) scaleX(-1)}100%{transform:translateX(0) scaleX(-1)}}
@keyframes atkEnemy{0%{transform:translateX(0)}50%{transform:translateX(-24px) scale(1.05)}100%{transform:translateX(0)}}
@keyframes damagePop{0%{opacity:0;transform:translateX(-50%) translateY(10px) scale(.7)}25%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-24px) scale(1.05)}}
.hitL{animation:hitLeft .22s ease}.hitR{animation:hitRight .22s ease}.atkP{animation:atkPlayer .24s ease}.atkE{animation:atkEnemy .24s ease}.damageAnim{animation:damagePop .7s ease forwards}
@media (max-width:520px){
  .rowBattle,.row{grid-template-columns:1fr 44px 1fr;gap:8px}
  .vs{font-size:24px}
  .fighter{min-height:252px;padding:12px}
  .fName,.name{font-size:20px}
  .dialogWrap{bottom:150px}
  .fullBadge{font-size:16px}
  .fullText,.cutText{font-size:16px}
  .systemPromptText{font-size:14px}
}
</style>
</head>
<body>
<div id="bg" class="bg"></div>
<div class="bgShade"></div>

<div class="app">
  <section id="screenBuild">
    <div class="title">デカブサ大戦</div>
    <div class="sub">5対5 / 12体 / チー娘4人</div>

    <div class="card section">
      <div class="sectionTitle">チー娘選択</div>
      <div id="girlRow" class="girlRow"></div>
      <div class="girlPreview" style="margin-top:12px">
        <img id="girlPreviewImg" src="" alt="">
        <div id="girlPreviewText" class="girlPreviewText"></div>
      </div>
    </div>

    <div class="card section">
      <div class="sectionTitle">ゲームモード</div>
      <div class="modeRow">
        <button id="modeFreeBtn" class="modeBtn active">通常対戦</button>
        <button id="modeStoryBtn" class="modeBtn">ストーリー</button>
      </div>
      <div class="muted" id="modeHint" style="font-size:12px;margin-top:8px">ランダム敵チームと戦う</div>
    </div>

    <div class="card section">
      <div class="sectionTitle">バトルモード</div>
      <div class="modeRow">
        <button id="battleSurvivalBtn" class="modeBtn active">勝ち抜き</button>
        <button id="battleFixedBtn" class="modeBtn">対面固定</button>
      </div>
      <div class="muted" id="battleHint" style="font-size:12px;margin-top:8px">勝ったキャラが残って次と戦う</div>
    </div>

    <div class="card section">
      <div class="sectionTitle">チーム編成</div>
      <div class="muted" style="font-size:12px;margin-bottom:10px">先鋒 → 次鋒 → 中堅 → 副将 → 大将</div>
      <div id="teamList" class="teamList"></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button id="randomBtn" class="btnGhost" style="flex:1">ランダム</button>
        <button id="clearBtn" class="btnGhost" style="flex:1">全て外す</button>
      </div>
    </div>

    <div class="card section">
      <div class="sectionTitle">候補キャラ</div>
      <div id="pickGrid" class="pickGrid"></div>
    </div>

    <div class="topBtns">
      <button id="startBtn" class="btn">この並びで始める</button>
    </div>
  </section>

  <section id="screenBattle" hidden>
    <div class="title">デカブサ大戦</div>
    <div class="sub" id="battleSub">オート対戦</div>

    <div id="commentaryBox" class="card commentary">
      <img id="commentaryImg" src="" alt="">
      <div id="commentaryText" class="commentaryText"></div>
    </div>

    <div class="card section" style="padding:12px">
      <div class="sectionTitle" style="margin-bottom:8px">対戦速度</div>
      <div class="modeRow">
        <button class="speedBtn active" data-speed="normal">普通</button>
        <button class="speedBtn" data-speed="fast">速い</button>
        <button class="speedBtn" data-speed="turbo">爆速</button>
      </div>
    </div>

    <div class="boardWrap">
      <div class="card board">
        <div class="boardHead">
          <div style="font-size:13px;font-weight:900">あなた</div><div></div><div style="font-size:13px;font-weight:900;text-align:right">敵</div>
        </div>
        <div id="boardRows" class="boardRows"></div>
      </div>
    </div>

    <div id="flash" class="flash"></div>

    <div class="rowBattle">
      <div id="playerCard" class="fighter player">
        <div>
          <div id="playerFName" class="fName">-</div>
          <div id="playerFRole" class="fRole">-</div>
        </div>
        <div class="fBody">
          <div id="playerBubble" class="bubble left" hidden></div>
          <img id="playerFImg" class="fImg" src="" alt="">
        </div>
        <div>
          <div class="hpRow"><span>HP</span><span id="playerFHp">-</span></div>
          <div class="hpBar"><div id="playerFHpFill" class="hpFill"></div></div>
        </div>
      </div>

      <div class="vs">VS</div>

      <div id="enemyCard" class="fighter enemy">
        <div>
          <div id="enemyFName" class="fName">-</div>
          <div id="enemyFRole" class="fRole">-</div>
        </div>
        <div class="fBody">
          <div id="enemyBubble" class="bubble right" hidden></div>
          <img id="enemyFImg" class="fImg" src="" alt="">
        </div>
        <div>
          <div class="hpRow"><span>HP</span><span id="enemyFHp">-</span></div>
          <div class="hpBar"><div id="enemyFHpFill" class="hpFill enemyFill"></div></div>
        </div>
      </div>
    </div>

    <div id="live" class="live">準備完了。</div>

    <div id="log" class="card log"></div>

    <div id="battleActions" class="topBtns" style="margin-top:10px" hidden>
      <button id="rematchBtn" class="btnGhost">もう一度やる</button>
      <button id="backBtn" class="btn">編成に戻る</button>
    </div>
  </section>
</div>

<div id="cutin" class="overlay" hidden>
  <div class="fullCutin">
    <img id="cutinImg" class="fullCutinBg" src="" alt="">
    <div class="fullShade"></div>
    <div id="cutinTop" class="fullTop">第1話</div>

    <div class="dialogWrap">
      <div class="dialogBox">
        <div id="cutinName" class="fullBadge">チー娘A</div>
        <div id="cutinText" class="fullText"></div>
      </div>
    </div>

    <div id="systemBox" class="systemBox">
      <div id="systemPrompt" class="systemPromptText hidden"></div>
      <div class="systemBtns">
        <button id="cutinCancel" class="systemCancel hidden">戻る</button>
        <button id="cutinOk" class="systemOk">OK</button>
      </div>
    </div>
  </div>
</div>

<div id="mvpModal" class="overlay" hidden>
  <div class="mvpCard">
    <div class="cutTop">MVP</div>
    <div class="cutImgWrap"><img id="mvpImg" class="cutImg" src="" alt=""></div>
    <div id="mvpName" class="cutName">-</div>
    <div id="mvpStats" class="mvpStats"></div>
    <div id="mvpGirlLine" class="cutText" style="font-size:16px"></div>
    <div class="topBtns" style="margin-top:18px">
      <button id="mvpClose" class="btn">閉じる</button>
    </div>
  </div>
</div>

<script>
const CHARS = [
  {id:"dekabusa",name:"デカブサ",role:"安定",attr:"水",hp:130,atk:25,def:22,spd:8,img:"dekabusa.png",passive:"背水：HP50%以下で与ダメージ+50%"},
  {id:"kabao",name:"カバオ",role:"耐久・回復",attr:"水",hp:145,atk:26,def:28,spd:10,img:"kabao.png",passive:"回復：ターン終了時にHP8回復"},
  {id:"nise",name:"ニセブサ",role:"バランス",attr:"水",hp:120,atk:28,def:20,spd:12,img:"nise.png",passive:"被ダメージ-20%"},
  {id:"juzo",name:"ジュウゾウ",role:"反撃型",attr:"水",hp:110,atk:30,def:18,spd:14,img:"juzo.png",passive:"被弾後、次の攻撃ダメージ+50%"},
  {id:"ratel",name:"ラテロウ",role:"先手特化",attr:"火",hp:95,atk:34,def:14,spd:20,img:"rate.png",passive:"先手時ダメージ+30%"},
  {id:"kanemon",name:"カンえもん",role:"初撃特化",attr:"火",hp:100,atk:36,def:15,spd:16,img:"kan.png",passive:"最初の攻撃ダメージ+40%"},
  {id:"namaken",name:"ナマケン",role:"奇襲",attr:"火",hp:105,atk:32,def:16,spd:18,img:"namaken.png",passive:"相手が満HPなら与ダメージ+50%"},
  {id:"panpan",name:"パンパン",role:"ロマン",attr:"火",hp:100,atk:38,def:12,spd:14,img:"panpan.png",passive:"15%で空振り / 35%で与ダメージ+70%"},
  {id:"ani",name:"デカブサ兄",role:"連勝型",attr:"草",hp:115,atk:33,def:18,spd:15,img:"ani.png",passive:"ターン経過ごとに与ダメージ上昇"},
  {id:"tora",name:"トラさん",role:"分身",attr:"草",hp:105,atk:31,def:17,spd:17,img:"tora.png",passive:"20%で攻撃回避"},
  {id:"gori",name:"ゴリさん",role:"防御",attr:"草",hp:120,atk:27,def:24,spd:9,img:"gori.png",passive:"初回被ダメージ半減"},
  {id:"king",name:"キング",role:"フィニッシャー",attr:"草",hp:110,atk:36,def:16,spd:13,img:"king.png",passive:"相手HP30%以下なら与ダメージ+40%"}
];
const GIRLS = {

function calcDamage(att, def){ if(!att.alive || !def.alive) return {damage:0, crit:false, text:""}; if(def.id==="tora" && Math.random()<0.2){ return {damage:0, crit:false, text:`${def.name}は分身した。`}; } let rate = attrAdv(att.attr, def.attr); let base = Math.max(8, att.atk - def.def*0.45); let skillRate = 1; let crit = false; let text = ""; if(att.id==="kanemon" && !att.flags.firstAttackDone){ skillRate*=1.4; text="初撃全力。"; } if(att.id==="dekabusa" && att.currentHp<=att.maxHp*0.5){ skillRate*=1.5; text="背水。"; } if(att.id==="namaken" && def.currentHp===def.maxHp){ skillRate*=1.5; text="奇襲。"; } if(att.id==="king" && def.currentHp<=def.maxHp*0.3){ skillRate*=1.4; text="仕留めに来た。"; } if(att.id==="ani"){ skillRate*=1+att.flags.aniBoost; if(att.flags.aniBoost>0) text="加速装置。"; } if(att.id==="juzo" && att.flags.counterReady){ skillRate*=1.5; att.flags.counterReady=false; text="反撃態勢。"; } if(att.id==="ratel" && state.battle.firstActorId===att.id){ skillRate*=1.3; text="先手必勝。"; } if(att.id==="panpan"){ if(Math.random()<0.15) return {damage:0, crit:false, text:`${att.name}は空振りした。`}; if(Math.random()<0.35){ skillRate*=1.7; text="暴走した。"; }} let reduce = 1; if(def.id==="gori" && !def.flags.firstHitTaken){ reduce*=0.5; text = text ? text+" 初回ガード。" : "初回ガード。"; } if(def.id==="nise") reduce*=0.8; if(Math.random()<0.08){ crit=true; skillRate*=1.5; } const dmg = Math.max(8, Math.round(base * rate * skillRate * reduce * (0.92 + Math.random()*0.16))); att.flags.firstAttackDone = true; def.flags.firstHitTaken = true; if(def.id==="juzo" && def.alive) def.flags.counterReady = true; return {damage:dmg, crit, text, rate};}
function healEndTurn(f){if(!f.alive) return null; if(f.id==="kabao"){const before=f.currentHp; f.currentHp = Math.min(f.maxHp, f.currentHp+8); if(f.currentHp>before) return `${f.name}は回復した。`; } return null;}

function renderBoard(){el.boardRows.innerHTML=""; const labels=["先鋒","次鋒","中堅","副将","大将"]; for(let i=0;i<5;i++){const p=state.battle.playerTeam[i], e=state.battle.enemyTeam[i]; const row=document.createElement("div"); row.className="boardRow"; row.innerHTML = `<div class="mini player ${p&&!p.alive?'dead':''} ${state.battle.playerIndex===i&&!state.battle.resultView?'active':''}"><img src="${p?p.img:''}" alt=""><div><div class="miniName">${labels[i]} ${p?p.name:'-'}</div><div class="miniMeta">${p?`${p.attr} / HP ${Math.max(0,p.currentHp)}`:'-'}</div></div><div style="font-size:11px;font-weight:900">${p?(p.alive?'○':'×'):''}</div></div><div><div class="boardLink ${state.battle.playerIndex===i && state.battle.enemyIndex===i && !state.battle.resultView ? 'active':''}"></div></div><div class="mini right ${e&&!e.alive?'dead':''} ${state.battle.enemyIndex===i&&!state.battle.resultView?'active':''}"><div style="font-size:11px;font-weight:900">${e?(e.alive?'○':'×'):''}</div><div style="text-align:right"><div class="miniName">${e?e.name:'-'} ${labels[i]}</div><div class="miniMeta">${e?`${e.attr} / HP ${Math.max(0,e.currentHp)}`:'-'}</div></div><img src="${e?e.img:''}" alt=""></div>`; el.boardRows.appendChild(row);} }

async function attackOnce(att, def){showBubble(att.side, ATTACK_LINES[att.id][0]); animateAttack(att.side); addLog(`${att.name}の攻撃。`); await wait(speedMap[state.speed].talk); const res = calcDamage(att, def); if(res.text) addLog(res.text); if(res.damage<=0){ addLog(`${att.name}の攻撃は当たらない。`); return; } def.currentHp -= res.damage; att.damageDealt += res.damage; def.damageTaken += res.damage; animateHit(def.side); showBubble(def.side, HIT_LINES[def.id][0]); showDamage(def.side, res.damage, res.crit); renderBattleHeader(); if(res.crit){ showFlash("クリティカル！","crit"); setCommentary(chooseGirlLine("crit")); } else { setCommentary(chooseGirlLine("normal")); } if(def.currentHp<=0){ def.currentHp=0; def.alive=false; att.wins += 1; att.matchWin += 1; renderBattleHeader(); showFlash("K.O.","ko"); addLog(`${def.name}は倒れた。`); setCommentary(chooseGirlLine("finish")); await wait(speedMap[state.speed].ko);} }
async function processMatch(p,e){while(p.alive && e.alive){ state.battle.turn += 1; if(p.currentHp<=p.maxHp*0.35 || e.currentHp<=e.maxHp*0.35) setCommentary(chooseGirlLine("danger")); const first = chooseFirst(p,e); const second = first===p ? e : p; state.battle.firstActorId = first.id; await attackOnce(first, second); if(second.alive) await wait(speedMap[state.speed].after); if(second.alive) await attackOnce(second, first); if(p.id==="ani" && p.alive) p.flags.aniBoost = Math.min(.3, p.flags.aniBoost + .1); if(e.id==="ani" && e.alive) e.flags.aniBoost = Math.min(.3, e.flags.aniBoost + .1); const healP = healEndTurn(p); if(healP) addLog(healP); const healE = healEndTurn(e); if(healE) addLog(healE); renderBattleHeader(); await wait(speedMap[state.speed].turn);} }
function calcMvp(teamA, teamB){const all=[...teamA,...teamB]; all.sort((a,b)=> (b.matchWin*100 + b.wins*80 + b.damageDealt + Math.max(0,b.currentHp)) - (a.matchWin*100 + a.wins*80 + a.damageDealt + Math.max(0,a.currentHp))); return all[0];}
async function finishBattle(playerWon){state.battle.playerWon = playerWon; state.battle.resultView = true; state.battle.playerIndex = -1; state.battle.enemyIndex = -1; state.battle.mvp = calcMvp(state.battle.playerTeam, state.battle.enemyTeam); renderBattleHeader(); openCutin({top: playerWon ? "WIN" : "LOSE", text: playerWon ? GIRLS[state.girl].win : GIRLS[state.girl].lose, okText: "MVPへ", onOk: openMvp}); el.battleActions.hidden = false; addLog(playerWon ? "あなたの勝ち。" : "相手の勝ち。");}
async function startBattleLoop(){state.battle = {playerTeam: state.team.map((id,i)=>cloneFighter(getChar(id),"player",i)), enemyTeam: makeEnemyTeamIds().map((id,i)=>cloneFighter(getChar(id),"enemy",i)), playerIndex: 0, enemyIndex: 0, turn: 0, resultView: false, playerWon: false, lastPlayer: null, lastEnemy: null, mvp: null, firstActorId: null}; el.log.innerHTML=""; el.battleActions.hidden = true; el.battleSub.textContent = `${state.gameMode==="story" ? GIRLS[state.girl].name + "との対戦" : "オート対戦"} / ${state.battleMode==="survival" ? "勝ち抜き" : "対面固定"}`; setCommentary(GIRLS[state.girl].intro); showOnly("battle"); renderBattleHeader(); if(state.battleMode==="fixed"){for(let i=0;i<5;i++){const p=state.battle.playerTeam[i], e=state.battle.enemyTeam[i]; state.battle.playerIndex = i; state.battle.enemyIndex = i; state.battle.lastPlayer = p; state.battle.lastEnemy = e; addLog(`${["先鋒","次鋒","中堅","副将","大将"][i]}同士の対戦。`); await processMatch(p,e);} const pWins = state.battle.playerTeam.reduce((s,v)=>s+v.matchWin,0); const eWins = state.battle.enemyTeam.reduce((s,v)=>s+v.matchWin,0); await finishBattle(pWins>=eWins);} else {while(true){let p = state.battle.playerTeam[state.battle.playerIndex], e = state.battle.enemyTeam[state.battle.enemyIndex]; if(!p || !e) break; state.battle.lastPlayer = p; state.battle.lastEnemy = e; addLog(`${["先鋒","次鋒","中堅","副将","大将"][state.battle.playerIndex]} ${p.name} vs ${["先鋒","次鋒","中堅","副将","大将"][state.battle.enemyIndex]} ${e.name}`); await processMatch(p,e); if(!p.alive) state.battle.playerIndex = nextAlive(state.battle.playerTeam, state.battle.playerIndex+1); if(!e.alive) state.battle.enemyIndex = nextAlive(state.battle.enemyTeam, state.battle.enemyIndex+1); if(state.battle.playerIndex===-1 || state.battle.enemyIndex===-1) break;} await finishBattle(state.battle.enemyIndex===-1);} }
el.modeFreeBtn.onclick = ()=>{state.gameMode="free";renderModes();};
el.modeStoryBtn.onclick = ()=>{state.gameMode="story";renderModes();};
el.battleSurvivalBtn.onclick = ()=>{state.battleMode="survival";renderModes();};
el.battleFixedBtn.onclick = ()=>{state.battleMode="fixed";renderModes();};
el.randomBtn.onclick = randomTeam;
el.clearBtn.onclick = clearTeam;
el.startBtn.onclick = ()=>{if(state.team.length!==5){ alert("5体必要です"); return; } openCutin({top: state.gameMode==="story" ? `第${["A","B","C","D"].indexOf(state.girl)+1}話` : "通常対戦", text: GIRLS[state.girl].intro, systemText: GIRLS[state.girl].systemAsk, showCancel: true, okText: "戦う", cancelText: "戻る", onOk: startBattleLoop});};
el.rematchBtn.onclick = ()=> startBattleLoop();
el.backBtn.onclick = ()=> showOnly("build");
el.speedBtns.forEach(b=>b.onclick=()=>{state.speed = b.dataset.speed; el.speedBtns.forEach(x=>x.classList.toggle("active", x===b));});
function init(){state.team = ["tora","kabao","king","ratel","dekabusa"]; renderGirlRow(); renderGirlPreview(); renderModes(); renderTeamList(); renderPickGrid(); setBg(); setCommentary(GIRLS[state.girl].preview); showOnly("build");}
init();
</script>
