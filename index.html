const E={bg:gid("bg"),girlRow:gid("girlRow"),gPrevImg:gid("gPrevImg"),gPrevText:gid("gPrevText"),freeBtn:gid("freeBtn"),storyBtn:gid("storyBtn"),modeHint:gid("modeHint"),survivalBtn:gid("survivalBtn"),fixedBtn:gid("fixedBtn"),battleHint:gid("battleHint"),teamList:gid("teamList"),pickGrid:gid("pickGrid"),randomBtn:gid("randomBtn"),clearBtn:gid("clearBtn"),startBtn:gid("startBtn"),build:gid("build"),battleScreen:gid("battleScreen"),battleSub:gid("battleSub"),cImg:gid("cImg"),cText:gid("cText"),brows:gid("brows"),flash:gid("flash"),pCard:gid("pCard"),eCard:gid("eCard"),pName:gid("pName"),pRole:gid("pRole"),pImg:gid("pImg"),pHp:gid("pHp"),pFill:gid("pFill"),eName:gid("eName"),eRole:gid("eRole"),eImg:gid("eImg"),eHp:gid("eHp"),eFill:gid("eFill"),pBubble:gid("pBubble"),eBubble:gid("eBubble"),live:gid("live"),log:gid("log"),actions:gid("actions"),rematch:gid("rematch"),back:gid("back"),speedBtns:[...document.querySelectorAll(".speed")],cutin:gid("cutin"),cutinImg:gid("cutinImg"),ctop:gid("ctop"),cname:gid("cname"),ctext:gid("ctext"),sprompt:gid("sprompt"),ccancel:gid("ccancel"),cok:gid("cok"),mvpModal:gid("mvpModal"),mvpImg:gid("mvpImg"),mvpName:gid("mvpName"),mvpStats:gid("mvpStats"),mvpLine:gid("mvpLine"),mvpClose:gid("mvpClose")};
function gid(id){return document.getElementById(id)} function g(){return GIRLS[S.girl]} function ch(id){return CHARS.find(x=>x.id===id)} function clone(v){return JSON.parse(JSON.stringify(v))} function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a} function wait(ms){return new Promise(r=>setTimeout(r,ms))} function show(scr){E.build.hidden=scr!=="build";E.battleScreen.hidden=scr!=="battle"} function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function adv(a,d){if(a==="水"&&d==="火")return 1.2;if(a==="火"&&d==="草")return 1.2;if(a==="草"&&d==="水")return 1.2;if(a==="火"&&d==="水")return .8;if(a==="草"&&d==="火")return .8;if(a==="水"&&d==="草")return .8;return 1}
function setBg(){E.bg.style.backgroundImage=`url(${g().img})`} function say(t){E.cImg.src=g().img;E.cText.textContent=`${g().name}「${t}」`}
function gl(kind){let a=g().c[kind]||g().c.normal;return a[rand(0,a.length-1)]}
function renderGirls(){
E.girlRow.innerHTML="";
Object.keys(GIRLS).forEach(k=>{
  const b=document.createElement("button");
  b.className="girlThumb"+(S.girl===k?" active":"");
  b.innerHTML=`<img src="${GIRLS[k].img}" alt="${GIRLS[k].name}" onerror="this.style.opacity='.15'"><span>${k}</span>`;
  b.onclick=()=>{
    S.girl=k;

function renderGirlPrev(){E.gPrevImg.src=g().img;E.gPrevText.textContent=`${g().name}\n${g().preview}`}
function renderModes(){E.freeBtn.classList.toggle("active",S.game==="free");E.storyBtn.classList.toggle("active",S.game==="story");E.modeHint.textContent=S.game==="free"?"ランダム敵チームと戦う":`${g().name}が組んだ固定チームと戦う`;E.survivalBtn.classList.toggle("active",S.battleMode==="survival");E.fixedBtn.classList.toggle("active",S.battleMode==="fixed");E.battleHint.textContent=S.battleMode==="survival"?"勝ったキャラが残って次と戦う":"先鋒同士、次鋒同士…の5本勝負"}
function renderTeam(){E.teamList.innerHTML="";let labs=["先鋒","次鋒","中堅","副将","大将"];for(let i=0;i<5;i++){let id=S.team[i],d=document.createElement("div");d.className="slot";if(id){let c=ch(id);d.innerHTML=`<img src="${c.img}" onerror="this.style.opacity='.15'"><div><div class="slotName">${labs[i]} ${c.name}</div><div class="slotMeta">${c.attr} / ${c.role}</div></div><div class="mv"><button data-up="${i}" ${i===0?"disabled":""}>▲</button><button data-down="${i}" ${i===S.team.length-1?"disabled":""}>▼</button></div>`}else{d.innerHTML=`<img style="opacity:.15"><div><div class="slotName">${labs[i]} 未選択</div><div class="slotMeta">ここに入れる</div></div><div class="mv"><button disabled>▲</button><button disabled>▼</button></div>`}E.teamList.appendChild(d)}E.teamList.querySelectorAll("[data-up]").forEach(b=>b.onclick=()=>{let i=+b.dataset.up;[S.team[i-1],S.team[i]]=[S.team[i],S.team[i-1]];renderTeam()});E.teamList.querySelectorAll("[data-down]").forEach(b=>b.onclick=()=>{let i=+b.dataset.down;[S.team[i+1],S.team[i]]=[S.team[i],S.team[i+1]];renderTeam()})}
function renderPicks(){E.pickGrid.innerHTML="";CHARS.forEach(c=>{let sel=S.team.includes(c.id),d=document.createElement("div");d.className="pick"+(sel?" sel":"");d.innerHTML=`<img src="${c.img}" onerror="this.style.opacity='.15'"><div><div class="pname">${c.name}</div><div class="pmeta">${c.attr} / ${c.role}</div><div class="pstats">HP ${c.hp}　攻 ${c.atk}　防 ${c.def}　速 ${c.spd}</div><div class="ppass">${c.passive}</div><div class="row" style="margin-top:8px">${sel?`<button class="btn2" data-r="${c.id}">外す</button>`:`<button class="btn" data-a="${c.id}">選ぶ</button>`}</div></div>`;E.pickGrid.appendChild(d)});E.pickGrid.querySelectorAll("[data-a]").forEach(b=>b.onclick=()=>{if(S.team.length>=5)return alert("5体までです");S.team.push(b.dataset.a);renderTeam();renderPicks()});E.pickGrid.querySelectorAll("[data-r]").forEach(b=>b.onclick=()=>{S.team=S.team.filter(x=>x!==b.dataset.r);renderTeam();renderPicks()})}
function fclone(c,side,idx){return {...clone(c),side,idx,currentHp:c.hp,maxHp:c.hp,alive:true,wins:0,matchWin:0,damageDealt:0,damageTaken:0,flags:{first:false,hit:false,ani:0,counter:false}}}
function enemyIds(){return S.game==="story"?STORY[S.girl].slice():shuffle(CHARS.map(c=>c.id).filter(id=>!S.team.includes(id))).slice(0,5)}
function ap(){return S.battle.playerTeam[S.battle.pi]} function ae(){return S.battle.enemyTeam[S.battle.ei]}
function nextAlive(arr,s){for(let i=s;i<arr.length;i++)if(arr[i].alive)return i;return -1}
function first(a,b){return a.spd+rand(-2,2)>=b.spd+rand(-2,2)?a:b}
function calc(att,def){if(def.id==="tora"&&Math.random()<.2)return{d:0,c:false,t:`${def.name}は分身した。`};let rate=adv(att.attr,def.attr),base=Math.max(8,att.atk-def.def*.45),mul=1,crit=false,text="";if(att.id==="kanemon"&&!att.flags.first){mul*=1.4;text="初撃全力。"}if(att.id==="dekabusa"&&att.currentHp<=att.maxHp*.5){mul*=1.5;text="背水。"}if(att.id==="namaken"&&def.currentHp===def.maxHp){mul*=1.5;text="奇襲。"}if(att.id==="king"&&def.currentHp<=def.maxHp*.3){mul*=1.4;text="仕留めに来た。"}if(att.id==="ani"){mul*=1+att.flags.ani;if(att.flags.ani>0)text="加速装置。"}if(att.id==="juzo"&&att.flags.counter){mul*=1.5;att.flags.counter=false;text="反撃態勢。"}if(att.id==="ratel"&&S.battle.firstId===att.id){mul*=1.3;text="先手必勝。"}if(att.id==="panpan"){if(Math.random()<.15)return{d:0,c:false,t:`${att.name}は空振りした。`};if(Math.random()<.35){mul*=1.7;text="暴走した。"}}let reduce=1;if(def.id==="gori"&&!def.flags.hit){reduce*=.5;text=text?text+" 初回ガード。":"初回ガード。"}if(def.id==="nise")reduce*=.8;if(Math.random()<.08){crit=true;mul*=1.5}let dmg=Math.max(8,Math.round(base*rate*mul*reduce*(.92+Math.random()*.16)));att.flags.first=true;def.flags.hit=true;if(def.id==="juzo"&&def.alive)def.flags.counter=true;return{d:dmg,c:crit,t:text}}
function heal(f){if(f.id==="kabao"&&f.alive){let b=f.currentHp;f.currentHp=Math.min(f.maxHp,f.currentHp+8);if(f.currentHp>b)return `${f.name}は回復した。`}return null}
function bubble(side,text){let t=side==="player"?E.pBubble:E.eBubble;t.textContent=text;t.hidden=false;clearTimeout(t._t);t._t=setTimeout(()=>t.hidden=true,850)}
function animAtk(side){let c=side==="player"?E.pCard:E.eCard,k=side==="player"?"atkP":"atkE";c.classList.remove(k);void c.offsetWidth;c.classList.add(k);setTimeout(()=>c.classList.remove(k),260)}
function animHit(side){let c=side==="player"?E.pCard:E.eCard,k=side==="player"?"hitL":"hitR";c.classList.remove(k);void c.offsetWidth;c.classList.add(k);setTimeout(()=>c.classList.remove(k),240)}
function dmg(side,val,crit){let c=side==="player"?E.pCard:E.eCard,d=document.createElement("div");d.className="dmg dAnim";d.style.color=crit?"#ffd95e":"#fff";d.textContent=val;c.appendChild(d);setTimeout(()=>d.remove(),700)}
function flash(txt,type="n"){E.flash.textContent=txt;if(type==="ko"){E.flash.style.background="linear-gradient(180deg,rgba(255,215,90,.22),rgba(255,140,0,.10))";E.flash.style.border="1px solid rgba(255,215,90,.35)"}else if(type==="crit"){E.flash.style.background="linear-gradient(180deg,rgba(255,110,110,.22),rgba(255,255,255,.06))";E.flash.style.border="1px solid rgba(255,150,150,.3)"}else{E.flash.style.background="linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.06))";E.flash.style.border="1px solid rgba(255,255,255,.2)"}E.flash.style.opacity="1";E.flash.style.transform="translateY(0) scale(1)";clearTimeout(flash._t);flash._t=setTimeout(()=>{E.flash.style.opacity="0";E.flash.style.transform="translateY(-6px) scale(.98)"},700)}
function log(t){let d=document.createElement("div");d.className="logLine";d.textContent=t;E.log.appendChild(d);E.log.scrollTop=E.log.scrollHeight;E.live.textContent=t}
function renderBattle(){let p=S.battle.view?S.battle.lastP:ap(),e=S.battle.view?S.battle.lastE:ae();E.pName.textContent=p?`${S.battle.view?(S.battle.playerWon?"勝ち ":"負け "):""}${p.name}`:"-";E.pRole.textContent=p?`${p.attr} / ${p.role}`:"-";E.pImg.src=p?p.img:"";E.pHp.textContent=p?`${Math.max(0,p.currentHp)} / ${p.maxHp}`:"-";E.pFill.style.width=p?`${Math.max(0,p.currentHp/p.maxHp*100)}%`:"0%";E.eName.textContent=e?`${S.battle.view?(S.battle.playerWon?"負け ":"勝ち "):""}${e.name}`:"-";E.eRole.textContent=e?`${e.attr} / ${e.role}`:"-";E.eImg.src=e?e.img:"";E.eHp.textContent=e?`${Math.max(0,e.currentHp)} / ${e.maxHp}`:"-";E.eFill.style.width=e?`${Math.max(0,e.currentHp/e.maxHp*100)}%`:"0%";renderBoard()}
function renderBoard(){E.brows.innerHTML="";let L=["先鋒","次鋒","中堅","副将","大将"];for(let i=0;i<5;i++){let p=S.battle.playerTeam[i],e=S.battle.enemyTeam[i],r=document.createElement("div");r.className="brow";r.innerHTML=`<div class="mini ${p&&!p.alive?'dead':''} ${S.battle.pi===i&&!S.battle.view?'act':''}"><img src="${p?p.img:''}"><div><div class="miniName">${L[i]} ${p?p.name:'-'}</div><div class="miniMeta">${p?`${p.attr} / HP ${Math.max(0,p.currentHp)}`:'-'}</div></div><div style="font-size:11px;font-weight:900">${p?(p.alive?'○':'×'):''}</div></div><div><div class="vlink ${S.battle.pi===i&&S.battle.ei===i&&!S.battle.view?'act':''}"></div></div><div class="mini right ${e&&!e.alive?'dead':''} ${S.battle.ei===i&&!S.battle.view?'act':''}"><div style="font-size:11px;font-weight:900">${e?(e.alive?'○':'×'):''}</div><div style="text-align:right"><div class="miniName">${e?e.name:'-'} ${L[i]}</div><div class="miniMeta">${e?`${e.attr} / HP ${Math.max(0,e.currentHp)}`:'-'}</div></div><img src="${e?e.img:''}"></div>`;E.brows.appendChild(r)}}
function cutin({top,text,prompt="",showCancel=false,okText="OK",cancelText="戻る",ok=null,cancel=null}){E.cutin.hidden=false;E.cutinImg.src=g().img;E.ctop.textContent=top;E.cname.textContent=g().name;E.ctext.textContent=text;E.sprompt.textContent=prompt;E.sprompt.hidden=!prompt;E.ccancel.hidden=!showCancel;E.ccancel.textContent=cancelText;E.cok.textContent=okText;E.cok.onclick=()=>{E.cutin.hidden=true;if(ok)ok()};E.ccancel.onclick=()=>{E.cutin.hidden=true;if(cancel)cancel()}}
function openMvp(){let m=S.battle.mvp;E.mvpImg.src=m.img;E.mvpName.textContent=m.name;E.mvpStats.textContent=`勝利本数 ${m.matchWin}\n撃破数 ${m.wins}\n残HP ${Math.max(0,m.currentHp)}\n総ダメ ${m.damageDealt}`;E.mvpLine.textContent=`${g().name}「${g().mvp}」`;E.mvpModal.hidden=false}
E.mvpClose.onclick=()=>E.mvpModal.hidden=true
async function attack(att,def){bubble(att.side,AL[att.id][0]);animAtk(att.side);log(`${att.name}の攻撃。`);await wait(SP[S.speed].talk);let r=calc(att,def);if(r.t)log(r.t);if(r.d<=0){log(`${att.name}の攻撃は当たらない。`);return}def.currentHp-=r.d;att.damageDealt+=r.d;def.damageTaken+=r.d;animHit(def.side);bubble(def.side,HL[def.id][0]);dmg(def.side,r.d,r.c);renderBattle();if(r.c){flash("クリティカル！","crit");say(gl("crit"))}else say(gl("normal"));if(def.currentHp<=0){def.currentHp=0;def.alive=false;att.wins++;att.matchWin++;renderBattle();flash("K.O.","ko");log(`${def.name}は倒れた。`);say(gl("finish"));await wait(SP[S.speed].ko)}}
async function match(p,e){while(p.alive&&e.alive){S.battle.turn++;if(p.currentHp<=p.maxHp*.35||e.currentHp<=e.maxHp*.35)say(gl("danger"));let a=first(p,e),d=a===p?e:p;S.battle.firstId=a.id;await attack(a,d);if(d.alive)await wait(SP[S.speed].after);if(d.alive)await attack(d,a);if(p.id==="ani"&&p.alive)p.flags.ani=Math.min(.3,p.flags.ani+.1);if(e.id==="ani"&&e.alive)e.flags.ani=Math.min(.3,e.flags.ani+.1);let hp=heal(p),he=heal(e);if(hp)log(hp);if(he)log(he);renderBattle();await wait(SP[S.speed].turn)}}
function mvp(a,b){let all=[...a,...b];all.sort((x,y)=>(y.matchWin*100+y.wins*80+y.damageDealt+Math.max(0,y.currentHp))-(x.matchWin*100+x.wins*80+x.damageDealt+Math.max(0,x.currentHp)));return all[0]}
async function finish(win){S.battle.playerWon=win;S.battle.view=true;S.battle.pi=-1;S.battle.ei=-1;S.battle.mvp=mvp(S.battle.playerTeam,S.battle.enemyTeam);renderBattle();cutin({top:win?"WIN":"LOSE",text:win?g().win:g().lose,okText:"MVPへ",ok:openMvp});E.actions.hidden=false;log(win?"あなたの勝ち。":"相手の勝ち。")}
async function runBattle(){S.battle={playerTeam:S.team.map((id,i)=>fclone(ch(id),"player",i)),enemyTeam:(S.game==="story"?STORY[S.girl]:shuffle(CHARS.map(c=>c.id).filter(id=>!S.team.includes(id))).slice(0,5)).map((id,i)=>fclone(ch(id),"enemy",i)),pi:0,ei:0,turn:0,view:false,playerWon:false,lastP:null,lastE:null,mvp:null,firstId:null};E.log.innerHTML="";E.actions.hidden=true;E.battleSub.textContent=`${S.game==="story"?g().name+"との対戦":"オート対戦"} / ${S.battleMode==="survival"?"勝ち抜き":"対面固定"}`;say(g().intro);show("battle");renderBattle();if(S.battleMode==="fixed"){for(let i=0;i<5;i++){let p=S.battle.playerTeam[i],e=S.battle.enemyTeam[i];S.battle.pi=i;S.battle.ei=i;S.battle.lastP=p;S.battle.lastE=e;log(`${["先鋒","次鋒","中堅","副将","大将"][i]}同士の対戦。`);await match(p,e)}let pw=S.battle.playerTeam.reduce((s,v)=>s+v.matchWin,0),ew=S.battle.enemyTeam.reduce((s,v)=>s+v.matchWin,0);await finish(pw>=ew)}else{while(true){let p=S.battle.playerTeam[S.battle.pi],e=S.battle.enemyTeam[S.battle.ei];if(!p||!e)break;S.battle.lastP=p;S.battle.lastE=e;log(`${["先鋒","次鋒","中堅","副将","大将"][S.battle.pi]} ${p.name} vs ${["先鋒","次鋒","中堅","副将","大将"][S.battle.ei]} ${e.name}`);await match(p,e);if(!p.alive)S.battle.pi=nextAlive(S.battle.playerTeam,S.battle.pi+1);if(!e.alive)S.battle.ei=nextAlive(S.battle.enemyTeam,S.battle.ei+1);if(S.battle.pi===-1||S.battle.ei===-1)break}await finish(S.battle.ei===-1)}}
E.freeBtn.onclick=()=>{S.game="free";renderModes()};E.storyBtn.onclick=()=>{S.game="story";renderModes()};E.survivalBtn.onclick=()=>{S.battleMode="survival";renderModes()};E.fixedBtn.onclick=()=>{S.battleMode="fixed";renderModes()};E.randomBtn.onclick=()=>{S.team=shuffle(CHARS.map(c=>c.id)).slice(0,5);renderTeam();renderPicks()};E.clearBtn.onclick=()=>{S.team=[];renderTeam();renderPicks()};E.startBtn.onclick=()=>{if(S.team.length!==5)return alert("5体必要です");cutin({top:S.game==="story"?`第${["A","B","C","D"].indexOf(S.girl)+1}話`:"通常対戦",text:g().intro,prompt:g().ask,showCancel:true,okText:"戦う",cancelText:"戻る",ok:runBattle})};E.rematch.onclick=()=>runBattle();E.back.onclick=()=>show("build");E.speedBtns.forEach(b=>b.onclick=()=>{S.speed=b.dataset.sp;E.speedBtns.forEach(x=>x.classList.toggle("active",x===b))})
function init(){renderGirls();renderGirlPrev();renderModes();renderTeam();renderPicks();setBg();say(g().preview);show("build")}
init();
