<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>デカブサ大戦</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}
body{
  display:flex;
  justify-content:center;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
[hidden]{display:none!important}

:root{
  --maxw:560px;
  --line:rgba(255,255,255,.12);
  --muted:rgba(255,255,255,.68);
  --panelGlow:0 8px 24px rgba(0,0,0,.35);
}

.app{
  width:100%;
  max-width:var(--maxw);
  min-height:100svh;
  padding:8px 6px 84px;
}
.screen{
  min-height:calc(100svh - 16px);
  display:flex;
  flex-direction:column;
}
.title{
  text-align:center;
  font-size:34px;
  font-weight:900;
  letter-spacing:.08em;
  margin-top:8px;
}
.sub{
  text-align:center;
  font-size:14px;
  color:var(--muted);
  margin-top:10px;
}
.center{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
.btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:15px 14px;
  font-size:18px;
  font-weight:900;
  background:#fff;
  color:#000;
}
.btn:active{transform:scale(.98)}
.btnGhost{
  width:100%;
  border:none;
  border-radius:14px;
  padding:15px 14px;
  font-size:18px;
  font-weight:900;
  background:#1f1f1f;
  color:#fff;
  border:1px solid var(--line);
}
.version{
  text-align:center;
  font-size:12px;
  opacity:.4;
  margin-top:12px;
}
.heroWrap{text-align:center}
.hero{
  width:min(76vw,310px);
  max-width:310px;
  opacity:.97;
  animation:float 4s ease-in-out infinite;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,.45));
}
.copy{
  text-align:center;
  font-size:16px;
  opacity:.85;
  margin-bottom:22px;
}
.titleFooter{padding-bottom:10px}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0)}
}

.topBar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.backBtn{
  width:auto;
  min-width:92px;
  padding:12px 14px;
  font-size:14px;
  border-radius:12px;
}
.row{
  display:flex;
  gap:8px;
}
.col{min-width:0}
.leftCol{flex:1.08}
.rightCol{flex:.92}

.panel{
  background:linear-gradient(180deg,#141414,#101010);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  box-shadow:var(--panelGlow);
}
.sectionTitle{
  font-size:18px;
  font-weight:900;
  margin:14px 0 10px;
}
.teamInfo{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

/* 属性 */
.attr-fire{background:rgba(255,110,110,.18)}
.attr-water{background:rgba(100,170,255,.18)}
.attr-grass{background:rgba(90,220,130,.18)}

/* モード */
.modeRow{
  display:flex;
  gap:8px;
  margin:10px 0 2px;
}
.modeBtn{
  flex:1;
  min-width:110px;
  border:none;
  border-radius:12px;
  padding:12px 10px;
  background:#242424;
  color:#fff;
  border:1px solid var(--line);
  font-size:13px;
  font-weight:900;
}
.modeBtn.active{
  background:#fff;
  color:#000;
}

/* 候補キャラカード */
.pickGrid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.pickCardBig{
  border:1px solid rgba(255,255,255,.18);
  border-radius:18px;
  padding:8px 8px;
  background:#101010;
  position:relative;
  transition:transform .14s ease, box-shadow .2s ease, border-color .2s ease;
}
.pickCardBig.selected{
  border:2px solid #fff;
  box-shadow:0 0 10px rgba(255,255,255,.68), 0 0 22px rgba(255,255,255,.25);
}
.pickCardBig.tap{transform:scale(.985)}

.cardMain{
  display:grid;
  grid-template-columns:124px 1fr;
  gap:8px;
  align-items:stretch;
  min-height:150px;
}
.cardImgWrap{
  width:124px;
  min-height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}
.cardImg{
  width:118px;
  height:142px;
  object-fit:contain;
  object-position:center center;
  filter:drop-shadow(0 8px 18px rgba(0,0,0,.45));
  display:block;
}
.cardInfo{
  display:flex;
  flex-direction:column;
  min-width:0;
  justify-content:center;
}
.cardTopLine{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:8px;
}
.cardName{
  font-size:17px;
  font-weight:900;
  line-height:1.1;
}
.cardAttr{
  padding:4px 9px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.12);
  flex-shrink:0;
}
.cardRole{
  font-size:12px;
  opacity:.82;
  margin-top:2px;
  line-height:1.25;
}
.cardStats{
  font-size:12px;
  margin-top:5px;
  color:#ddd;
  line-height:1.25;
}
.roleRow{
  margin-top:6px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.roleTag{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:#232323;
  font-size:11px;
  font-weight:800;
  color:#f1f1f1;
  line-height:1;
}
.roleTag.type-attack{background:rgba(255,120,120,.12)}
.roleTag.type-tank{background:rgba(120,200,255,.12)}
.roleTag.type-speed{background:rgba(255,220,120,.12)}
.roleTag.type-balance{background:rgba(180,180,180,.12)}
.roleTag.type-finisher{background:rgba(200,120,255,.12)}
.roleTag.type-trick{background:rgba(120,255,200,.12)}
.cardSkill{
  font-size:12px;
  margin-top:7px;
  line-height:1.35;
  color:#f2f2f2;
}
.cardEquip{
  font-size:11px;
  margin-top:6px;
  color:#b8d7ff;
  line-height:1.35;
}
.cardButtons{
  margin-top:auto;
  display:flex;
  gap:6px;
  padding-top:8px;
}
.btnMain,.btnSub,.btnDetail,.btnEquip{
  flex:1;
  border:none;
  border-radius:10px;
  padding:10px 6px;
  font-size:12px;
  font-weight:900;
  min-height:42px;
}
.btnMain{background:#fff;color:#000}
.btnSub{background:#333;color:#fff}
.btnDetail{background:#555;color:#fff}
.btnEquip{background:#2b2b2b;color:#fff}

/* 並び */
.teamList{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.teamSlot{
  background:#1d1d1d;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  display:grid;
  grid-template-columns:42px 54px 1fr 58px;
  gap:10px;
  align-items:center;
}
.slotNum{
  width:42px;
  height:42px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#202020;
  border:1px solid var(--line);
  font-weight:900;
  font-size:14px;
}
.slotThumb{
  width:54px;
  height:54px;
  border-radius:12px;
  object-fit:cover;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.slotMain{min-width:0}
.slotName{
  font-size:15px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.slotMeta{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}
.slotEquip{
  font-size:10px;
  color:#b8d7ff;
  margin-top:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.slotEmpty{color:rgba(255,255,255,.35)}
.moveBtns{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.moveBtn{
  border:none;
  border-radius:10px;
  background:#2a2a2a;
  color:#fff;
  font-weight:900;
  padding:7px 0;
  border:1px solid var(--line);
  font-size:12px;
}
.moveBtn:disabled{opacity:.28}
.removeBtn{
  margin-top:6px;
  border:none;
  border-radius:10px;
  background:#1d1d1d;
  color:#fff;
  border:1px solid var(--line);
  padding:8px 0;
  font-size:12px;
  font-weight:900;
  width:100%;
}
.bottomActions{
  margin-top:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.buildHint{
  margin-top:10px;
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  font-size:13px;
  line-height:1.65;
  white-space:pre-line;
}
  /* マイデッキ */
.deckBox,.shareBox{
  margin-top:14px;
  padding:12px;
  border-radius:16px;
  background:#111;
  border:1px solid var(--line);
}
#deckList{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.deckItem{
  background:#1a1a1a;
  border:1px solid rgba(255,255,255,.12);
  border-radius:14px;
  padding:12px;
}
.deckHead{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
}
.deckName{
  font-size:15px;
  font-weight:900;
}
.deckMode{
  font-size:11px;
  opacity:.7;
}
.deckStats{
  margin-top:8px;
  font-size:12px;
}
.deckLead{
  margin-top:4px;
  font-size:12px;
  opacity:.8;
}
.deckBtns{
  display:flex;
  gap:8px;
  margin-top:10px;
}
.deckBtns button{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#333;
  color:#fff;
  font-size:12px;
  font-weight:900;
}
#deckName,#deckCode{
  width:100%;
  border:none;
  border-radius:12px;
  background:#222;
  color:#fff;
  padding:10px;
  font-size:12px;
}
#deckName{margin-bottom:10px}
#deckCode{
  min-height:86px;
  resize:vertical;
  line-height:1.5;
  margin-top:10px;
}

/* 図鑑 */
.dexList{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.dexRow{
  display:grid;
  grid-template-columns:56px 1fr auto;
  gap:10px;
  align-items:center;
  background:#1b1b1b;
  border:1px solid var(--line);
  border-radius:12px;
  padding:8px;
  cursor:pointer;
}
.dexThumb{
  width:56px;
  height:56px;
  object-fit:contain;
  border-radius:10px;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.dexName{
  font-size:14px;
  font-weight:900;
}
.dexMini{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}
.dexAttr{
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.12);
}
.dexHero{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:190px;
}
.dexHero img{
  max-width:220px;
  max-height:180px;
  object-fit:contain;
  filter:drop-shadow(0 12px 28px rgba(0,0,0,.45));
}
.dexDetailName{
  font-size:26px;
  font-weight:900;
  text-align:center;
}
.dexDetailAttr{
  margin:8px auto 0;
  width:max-content;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.14);
}
.dexRole{
  text-align:center;
  font-size:14px;
  color:#ddd;
  margin-top:8px;
}
.dexStatsGrid{
  margin-top:14px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
.dexStat{
  background:#171717;
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
}
.dexStatLabel{
  font-size:11px;
  color:var(--muted);
}
.dexStatValue{
  font-size:18px;
  font-weight:900;
  margin-top:4px;
}
.dexBlock{
  margin-top:12px;
  background:#171717;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
}
.dexBlockTitle{
  font-size:13px;
  font-weight:900;
  margin-bottom:6px;
}
.dexText{
  font-size:13px;
  line-height:1.65;
  color:#eee;
  white-space:pre-line;
}

/* 装備技 */
.skillList{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.skillCard{
  background:#171717;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}
.skillCard.active{
  outline:2px solid rgba(255,255,255,.55);
}
.skillName{
  font-size:15px;
  font-weight:900;
}
.skillDesc{
  font-size:12px;
  line-height:1.55;
  color:#ddd;
  margin-top:6px;
}
.skillBtns{
  display:flex;
  gap:8px;
  margin-top:10px;
}

/* お試し */
.testEnemyGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
.testEnemyCard{
  background:#161616;
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  text-align:center;
}
.testEnemyCard img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
  border-radius:12px;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.testEnemyName{
  font-size:14px;
  font-weight:900;
  margin-top:8px;
}
.testEnemyAttr{
  font-size:12px;
  color:#ddd;
  margin-top:2px;
}
.testEnemyBtn{
  margin-top:10px;
  width:100%;
  border:none;
  border-radius:12px;
  padding:12px 8px;
  background:#fff;
  color:#000;
  font-size:13px;
  font-weight:900;
}

/* メタ */
.battleMeta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.metaPill{
  padding:7px 10px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#171717;
  font-size:11px;
  color:#ddd;
}
.alivePill{font-weight:900}
.aliveGood{color:#b8ffd1}
.aliveBad{color:#ffc1c1}

/* 戦況表 */
.statusBoardWrap{
  position:relative;
  margin-bottom:12px;
}
.statusBoard{
  background:linear-gradient(180deg,#141414,#101010);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  box-shadow:var(--panelGlow);
  position:relative;
  z-index:1;
}
.statusLines{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:2;
}
.statusHead{
  display:grid;
  grid-template-columns:1fr 44px 1fr;
  gap:8px;
  align-items:center;
  margin-bottom:8px;
}
.statusHead .label{
  font-size:13px;
  font-weight:900;
  color:#ddd;
}
.statusHead .label.right{text-align:right}
.statusRows{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.statusRow{
  display:grid;
  grid-template-columns:1fr 44px 1fr;
  gap:8px;
  align-items:center;
}
.miniSideCard{
  background:#1a1a1a;
  border:1px solid var(--line);
  border-radius:12px;
  padding:8px;
  min-height:58px;
  display:grid;
  grid-template-columns:40px 1fr auto;
  gap:8px;
  align-items:center;
  position:relative;
}
.miniSideCard.right{grid-template-columns:auto 1fr 40px}
.miniSideCard.dead{
  opacity:.25;
  filter:grayscale(1);
}
.miniSideCard.active{
  outline:2px solid rgba(255,255,255,.55);
  box-shadow:0 0 0 3px rgba(255,255,255,.08);
}
.miniSideCard img{
  width:40px;
  height:40px;
  border-radius:10px;
  object-fit:cover;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.miniSideCard.playerSide img{transform:scaleX(-1)}
.miniSideCard.enemySide img{transform:scaleX(1)}
.miniSideMain{min-width:0}
.miniSideName{
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.miniSideMeta{
  font-size:10px;
  color:var(--muted);
  margin-top:2px;
}
.miniSideBadge{
  font-size:11px;
  font-weight:900;
  color:#fff;
}
.boardVs{
  display:flex;
  align-items:center;
  justify-content:center;
}
.boardLink{
  width:100%;
  height:2px;
  background:rgba(255,255,255,.18);
  position:relative;
}
.boardLink.active{
  background:rgba(255,255,255,.75);
  box-shadow:0 0 10px rgba(255,255,255,.22);
}

/* 拡大対戦 */
.battleTop{
  display:grid;
  grid-template-columns:1fr 64px 1fr;
  gap:10px;
  align-items:stretch;
  margin-bottom:10px;
}
.sideLabel{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}
.vs,.resultVs{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:900;
  opacity:.95;
}
.fighterCard{
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  min-height:286px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:var(--panelGlow);
  position:relative;
  overflow:hidden;
}
.fighterCard.fire{
  background:
    radial-gradient(circle at 30% 20%, rgba(255,90,90,.20), transparent 42%),
    linear-gradient(180deg,#251313,#120d0d);
}
.fighterCard.water{
  background:
    radial-gradient(circle at 30% 20%, rgba(90,150,255,.20), transparent 42%),
    linear-gradient(180deg,#101a2a,#0c1018);
}
.fighterCard.grass{
  background:
    radial-gradient(circle at 30% 20%, rgba(90,220,130,.18), transparent 42%),
    linear-gradient(180deg,#112317,#0b120d);
}
.fighterCard.none{
  background:linear-gradient(180deg,#171717,#101010);
}
.fighterHeader{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:0;
  padding-left:8px;
}
#enemyCard .fighterHeader,
#testEnemyCardBox .fighterHeader,
#resultEnemyCard .fighterHeader{
  padding-left:0;
  padding-right:8px;
}
.fighterBadges{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.fighterBadges.right{justify-content:flex-end}
.infoBadge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.08);
  font-size:11px;
  font-weight:900;
}
.badge-attr-fire{background:rgba(255,123,123,.12)}
.badge-attr-water{background:rgba(115,169,255,.12)}
.badge-attr-grass{background:rgba(100,220,130,.12)}
.badge-good{background:rgba(120,225,160,.16);color:#b8ffd1}
.badge-bad{background:rgba(255,127,127,.16);color:#ffc1c1}
.badge-even{background:rgba(255,255,255,.08);color:#eee}
.fighterName{
  font-size:20px;
  font-weight:900;
  line-height:1.1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.fighterRole{
  font-size:14px;
  color:#b8c8ff;
  line-height:1.2;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.fighterEquip{
  font-size:11px;
  color:#d7e6ff;
  line-height:1.35;
}
.fighterBody{
  flex:1;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
  min-height:140px;
  padding-bottom:6px;
}
.fighterVisual{
  width:150px;
  height:140px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
}
.fighterImg{
  max-width:100%;
  max-height:140px;
  object-fit:contain;
  filter:drop-shadow(0 8px 18px rgba(0,0,0,.45));
}
.fighterVisual.player .fighterImg{transform:scaleX(-1)}
.fighterVisual.enemy .fighterImg{transform:scaleX(1)}
.hpWrap{margin-top:8px}
.hpRow{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-bottom:5px;
}
.hpBar{
  width:100%;
  height:12px;
  background:#292929;
  border-radius:999px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
}
.hpFill{
  height:100%;
  width:100%;
  background:#fff;
  transition:width .28s ease;
}
.hpFill.low{background:#ff7b7b}
.hpFill.mid{background:#ffd24d}
.hpFill.high{background:#77e0a0}

/* 演出 */
.liveTicker{
  margin:4px 0 10px;
  padding:14px 14px;
  border-radius:14px;
  background:linear-gradient(180deg,#181818,#111);
  border:1px solid rgba(255,255,255,.12);
  font-size:17px;
  font-weight:900;
  line-height:1.45;
  min-height:56px;
  display:flex;
  align-items:center;
  box-shadow:0 8px 24px rgba(0,0,0,.28);
}
.logPanel{
  flex:1;
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  overflow:auto;
  min-height:180px;
  max-height:26svh;
}
.logLine{
  font-size:13px;
  line-height:1.65;
  padding:4px 0;
  border-bottom:1px dashed rgba(255,255,255,.06);
}

/* 結果 */
.battleActions{
  margin-top:12px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.resultTitle{
  font-size:22px;
  font-weight:900;
  text-align:center;
  margin:2px 0 2px;
}
.resultSub{
  text-align:center;
  color:var(--muted);
  font-size:13px;
  margin-bottom:2px;
}
.summaryCard{
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  line-height:1.75;
  font-size:13px;
  white-space:pre-line;
}
.speedRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.speedBtn{
  flex:1;
  min-width:84px;
  border:none;
  border-radius:12px;
  padding:10px 8px;
  background:#242424;
  color:#fff;
  border:1px solid var(--line);
  font-size:12px;
  font-weight:900;
}
.speedBtn.active{
  background:#fff;
  color:#000;
}

/* MVP */
.mvpPanel{
  background:linear-gradient(180deg,#181818,#101010);
  border:1px solid rgba(255,255,255,.16);
  border-radius:18px;
  padding:18px 14px;
  text-align:center;
  box-shadow:0 8px 28px rgba(0,0,0,.38);
  overflow:hidden;
  position:relative;
}
.mvpPanel.show{animation:mvpAppear .42s ease}
@keyframes mvpAppear{
  0%{opacity:0;transform:scale(.94) translateY(10px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
.mvpCrown{
  font-size:14px;
  font-weight:900;
  color:#ffd95e;
  letter-spacing:.08em;
}
.mvpImageWrap{
  min-height:200px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:10px;
}
.mvpImg{
  max-width:260px;
  max-height:200px;
  object-fit:contain;
  filter:drop-shadow(0 12px 28px rgba(0,0,0,.45));
}
.mvpName{
  font-size:34px;
  font-weight:900;
  margin-top:4px;
}
.mvpStats{
  margin-top:6px;
  font-size:13px;
  line-height:1.7;
  color:#ddd;
  white-space:pre-line;
}
.mvpLine{
  margin-top:10px;
  font-size:17px;
  font-weight:900;
}

/* 勝敗カード */
.resultDuel{
  display:grid;
  grid-template-columns:1fr 64px 1fr;
  gap:10px;
  align-items:stretch;
}
.resultOutcome{
  font-size:14px;
  font-weight:900;
  margin-bottom:6px;
}
.resultOutcome.win{color:#b8ffd1}
.resultOutcome.lose{color:#ffc1c1}
.resultCardGhost{
  opacity:.72;
  filter:grayscale(.15);
}

@media (max-width:520px){
  .title{font-size:31px}
  .row{flex-direction:column}
  .statusHead{grid-template-columns:1fr 34px 1fr;gap:6px}
  .statusRow{grid-template-columns:1fr 34px 1fr;gap:6px}
  .miniSideCard{
    min-height:54px;
    grid-template-columns:36px 1fr auto;
    padding:7px;
  }
  .miniSideCard.right{grid-template-columns:auto 1fr 36px}
  .miniSideCard img{
    width:36px;
    height:36px;
  }
  .battleTop,.resultDuel{
    grid-template-columns:1fr 48px 1fr;
    gap:8px;
  }
  .vs,.resultVs{font-size:22px}
  .fighterCard{min-height:252px;padding:12px}
  .fighterName{font-size:16px}
  .fighterBody{min-height:128px;padding-bottom:4px}
  .fighterVisual{width:128px;height:128px}
  .fighterImg{max-width:128px;max-height:128px}
  .cardMain{
    grid-template-columns:116px 1fr;
    min-height:146px;
  }
  .cardImgWrap{
    width:116px;
    min-height:146px;
  }
  .cardImg{
    width:112px;
    height:138px;
  }
}
</style>
</head>
<body>
<div class="app">

<!-- タイトル -->
<section id="screenTitle" class="screen">
  <div class="title">デカブサ大戦</div>
  <div class="sub">並びだけ決めろ。あとは全部オート。</div>

  <div class="center">
    <div class="heroWrap">
      <img src="img/dekabusa.png" class="hero">
      <div class="copy">5対5の完全オート団体戦</div>
      <button class="btn" onclick="goBuild()">スタート</button>
    </div>
  </div>

  <div class="version">v0.9</div>
</section>

<!-- デッキ編成 -->
<section id="screenBuild" class="screen" hidden>

  <div class="topBar">
    <button class="btnGhost backBtn" onclick="goTitle()">戻る</button>
    <div class="row">
      <button class="modeBtn active" id="mode5" onclick="setMode(5)">5体</button>
      <button class="modeBtn" id="mode3" onclick="setMode(3)">3体</button>
    </div>
  </div>

  <div class="row">

    <!-- 左：キャラ一覧 -->
    <div class="col leftCol">
      <div class="sectionTitle">キャラ選択</div>

      <div class="pickGrid" id="pickGrid">
        <!-- JSで生成 -->
      </div>
    </div>

    <!-- 右：編成 -->
    <div class="col rightCol">
      <div class="sectionTitle">編成</div>

      <div class="teamList" id="teamList">
        <!-- スロット -->
      </div>

      <div class="buildHint">
並び順がそのまま戦闘順になる

① 最初に出る
② 次に出る
③ …
      </div>

      <div class="bottomActions">
        <button class="btn" onclick="startBattle()">バトル開始</button>
        <button class="btnGhost" onclick="saveDeck()">デッキ保存</button>
        <button class="btnGhost" onclick="goDeck()">マイデッキ</button>
        <button class="btnGhost" onclick="goDex()">図鑑</button>
      </div>

    </div>
  </div>
</section>

<!-- マイデッキ -->
<section id="screenDeck" class="screen" hidden>

  <div class="topBar">
    <button class="btnGhost backBtn" onclick="goBuild()">戻る</button>
  </div>

  <div class="sectionTitle">マイデッキ</div>

  <div class="deckBox">
    <input id="deckName" placeholder="デッキ名">

    <div id="deckList"></div>
  </div>

  <div class="shareBox">
    <div class="sectionTitle">デッキ共有</div>
    <textarea id="deckCode" placeholder="コードを貼り付け"></textarea>
    <button class="btnGhost" onclick="loadDeck()">読み込み</button>
  </div>

</section>
<!-- 図鑑 -->
<section id="screenDex" class="screen" hidden>

  <div class="topBar">
    <button class="btnGhost backBtn" onclick="goBuild()">戻る</button>
  </div>

  <div class="sectionTitle">図鑑</div>

  <div id="dexList" class="dexList">
    <!-- JSで生成 -->
  </div>

</section>

<!-- 図鑑詳細 -->
<section id="screenDexDetail" class="screen" hidden>

  <div class="topBar">
    <button class="btnGhost backBtn" onclick="goDex()">戻る</button>
  </div>

  <div class="panel">
    <div class="dexHero">
      <img id="dexDetailImg" src="">
    </div>

    <div id="dexDetailName" class="dexDetailName">-</div>
    <div id="dexDetailAttr" class="dexDetailAttr">-</div>
    <div id="dexDetailRole" class="dexRole">-</div>

    <div id="dexDetailStats" class="dexStatsGrid">
      <!-- JS -->
    </div>

    <div class="dexBlock">
      <div class="dexBlockTitle">スキル</div>
      <div id="dexDetailSkill" class="dexText">-</div>
    </div>

    <div class="dexBlock">
      <div class="dexBlockTitle">説明</div>
      <div id="dexDetailDesc" class="dexText">-</div>
    </div>
  </div>

</section>

<!-- お試し -->
<section id="screenTest" class="screen" hidden>

  <div class="topBar">
    <button class="btnGhost backBtn" onclick="goBuild()">戻る</button>
  </div>

  <div class="sectionTitle">お試しバトル</div>

  <div class="panel">
    <div class="teamInfo">相手を選んで1対1で確認</div>
    <div id="testEnemyGrid" class="testEnemyGrid">
      <!-- JSで生成 -->
    </div>
  </div>

</section>

<!-- バトル -->
<section id="screenBattle" class="screen" hidden>

  <div class="topBar">
    <button class="btnGhost backBtn" onclick="goBuild()">編成へ</button>
    <div style="text-align:right">
      <div style="font-size:18px;font-weight:900">バトル</div>
      <div class="teamInfo">完全オート</div>
    </div>
  </div>

  <div class="battleMeta">
    <div id="battleModeText" class="metaPill">MODE -</div>
    <div id="battleTurnText" class="metaPill">TURN -</div>
    <div id="playerAliveText" class="metaPill alivePill aliveGood">自分 残り-</div>
    <div id="enemyAliveText" class="metaPill alivePill aliveBad">敵 残り-</div>
  </div>

  <div class="panel" style="margin-bottom:10px">
    <div class="sectionTitle" style="margin-top:0">対戦速度</div>
    <div class="speedRow">
      <button class="speedBtn active" onclick="setBattleSpeed('normal',this)">普通</button>
      <button class="speedBtn" onclick="setBattleSpeed('fast',this)">速い</button>
      <button class="speedBtn" onclick="setBattleSpeed('turbo',this)">爆速</button>
    </div>
  </div>

  <div class="statusBoardWrap">
    <svg id="statusLines" class="statusLines"></svg>
    <div class="statusBoard">
      <div class="statusHead">
        <div class="label">自分</div>
        <div></div>
        <div class="label right">敵</div>
      </div>
      <div id="statusRows" class="statusRows"></div>
    </div>
  </div>

  <div class="battleTop">
    <div>
      <div class="sideLabel">自分</div>
      <div id="playerCard" class="fighterCard none">
        <div class="fighterHeader">
          <div id="playerBadges" class="fighterBadges"></div>
          <div id="playerFighterName" class="fighterName">-</div>
          <div id="playerFighterRole" class="fighterRole">-</div>
          <div id="playerFighterEquip" class="fighterEquip">-</div>
        </div>

        <div class="fighterBody">
          <div class="fighterVisual player">
            <img id="playerFighterImg" class="fighterImg" src="">
          </div>
        </div>

        <div class="hpWrap">
          <div class="hpRow">
            <span>HP</span>
            <span id="playerHpText">-</span>
          </div>
          <div class="hpBar">
            <div id="playerHpFill" class="hpFill high"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="vs">VS</div>

    <div>
      <div class="sideLabel" style="text-align:right">敵</div>
      <div id="enemyCard" class="fighterCard none">
        <div class="fighterHeader">
          <div id="enemyBadges" class="fighterBadges right"></div>
          <div id="enemyFighterName" class="fighterName" style="text-align:right">-</div>
          <div id="enemyFighterRole" class="fighterRole" style="text-align:right">-</div>
          <div id="enemyFighterEquip" class="fighterEquip" style="text-align:right">-</div>
        </div>

        <div class="fighterBody">
          <div class="fighterVisual enemy">
            <img id="enemyFighterImg" class="fighterImg" src="">
          </div>
        </div>

        <div class="hpWrap">
          <div class="hpRow">
            <span>HP</span>
            <span id="enemyHpText">-</span>
          </div>
          <div class="hpBar">
            <div id="enemyHpFill" class="hpFill high"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="liveTicker" class="liveTicker">対戦開始。</div>
  <div id="logPanel" class="logPanel"></div>

  <div id="battleActions" class="battleActions" hidden>

    <div id="mvpPanel" class="mvpPanel" hidden>
      <div class="mvpCrown">MVP</div>
      <div class="mvpImageWrap">
        <img id="mvpImg" class="mvpImg" src="">
      </div>
      <div id="mvpName" class="mvpName">-</div>
      <div id="mvpStats" class="mvpStats">-</div>
      <div id="mvpLine" class="mvpLine">-</div>
    </div>

    <div id="resultTitle" class="resultTitle"></div>
    <div id="resultSub" class="resultSub"></div>

    <div class="resultDuel">
      <div>
        <div id="resultPlayerOutcome" class="resultOutcome">-</div>
        <div id="resultPlayerCard" class="fighterCard none resultCardGhost">
          <div class="fighterHeader">
            <div id="resultPlayerBadges" class="fighterBadges"></div>
            <div id="resultPlayerName" class="fighterName">-</div>
            <div id="resultPlayerRole" class="fighterRole">-</div>
            <div id="resultPlayerEquip" class="fighterEquip">-</div>
          </div>
          <div class="fighterBody">
            <div class="fighterVisual player">
              <img id="resultPlayerImg" class="fighterImg" src="">
            </div>
          </div>
          <div class="hpWrap">
            <div class="hpRow">
              <span>HP</span>
              <span id="resultPlayerHp">-</span>
            </div>
            <div class="hpBar">
              <div id="resultPlayerHpFill" class="hpFill high"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="resultVs">VS</div>

      <div>
        <div id="resultEnemyOutcome" class="resultOutcome" style="text-align:right">-</div>
        <div id="resultEnemyCard" class="fighterCard none resultCardGhost">
          <div class="fighterHeader">
            <div id="resultEnemyBadges" class="fighterBadges right"></div>
            <div id="resultEnemyName" class="fighterName" style="text-align:right">-</div>
            <div id="resultEnemyRole" class="fighterRole" style="text-align:right">-</div>
            <div id="resultEnemyEquip" class="fighterEquip" style="text-align:right">-</div>
          </div>
          <div class="fighterBody">
            <div class="fighterVisual enemy">
              <img id="resultEnemyImg" class="fighterImg" src="">
            </div>
          </div>
          <div class="hpWrap">
            <div class="hpRow">
              <span>HP</span>
              <span id="resultEnemyHp">-</span>
            </div>
            <div class="hpBar">
              <div id="resultEnemyHpFill" class="hpFill high"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="summaryCard" class="summaryCard"></div>

    <button class="btn" onclick="rematch()">もう一度やる</button>
    <button class="btnGhost" onclick="goBuild()">編成に戻る</button>
  </div>

</section>

</div>

<script src="script.js"></script>
</body>
</html>
