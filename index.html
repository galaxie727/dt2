<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>デカブサ大戦 完全版</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}

/* ===== 画面 ===== /
.screen{display:none}
.screen.active{display:block}

/ ===== キャラ ===== /
.card{
  display:inline-block;
  margin:10px;
}
.card img{
  width:100px;
  transition:.3s;
}

/ ===== 属性カラー ===== /
.attr-fire { filter:hue-rotate(0deg) saturate(1.6); }
.attr-water { filter:hue-rotate(180deg) saturate(1.2); }
.attr-thunder { filter:hue-rotate(60deg) saturate(2); }
.attr-dark { filter:brightness(.6) contrast(1.4); }

/ ===== カットイン ===== /
#cutin{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.6);
}
.hidden{display:none}

/ ===== MVP ===== /
#mvp{
  font-size:24px;
  margin-top:20px;
}
</style>
</head>

<body>

<!-- ===== タイトル ===== -->
<div id="title" class="screen active">
  <h1>デカブサ大戦</h1>

  <div>
    <img src="girlA_top.png" width="60" onclick="selectChi('A')">
    <img src="girlB_top.png" width="60" onclick="selectChi('B')">
    <img src="girlC_top.png" width="60" onclick="selectChi('C')">
  </div>

  <button onclick="startTournament()">大会モード</button>
</div>

<!-- ===== バトル ===== -->
<div id="battle" class="screen">
  <h2 id="roundText"></h2>

  <div class="card">
    <img id="pImg" src="dekabusa.png">
    <div>自分</div>
  </div>

  <div class="card">
    <img id="eImg" src="dekabusa.png">
    <div>敵</div>
  </div>

  <br>
  <button onclick="nextBattle()">戦う</button>
</div>

<!-- ===== 結果 ===== -->
<div id="result" class="screen">
  <h2 id="resultText"></h2>
  <div id="mvp"></div>
  <button onclick="nextRound()">次へ</button>
</div>

<!-- ===== カットイン ===== -->
<div id="cutin" class="hidden">
  <div>
    <img id="chiImg" width="120">
    <div id="chiText"></div>
  </div>
</div>

<script>

/ ===== チー娘 ===== /
const chiGirls = [
 {id:"A",img:"girlA_top.png",aff:0,
  lines:["お願い","いけるよ","信じてる","任せた"]},
 {id:"B",img:"girlB_top.png",aff:0,
  lines:["いくよ","いい感じ","強いね","最高"]},
 {id:"C",img:"girlC_top.png",aff:0,
  lines:["頼む","悪くない","いいね","決めて"]}
];

let chi = chiGirls[0];

function selectChi(id){
  chi = chiGirls.find(c=>c.id===id);
}

/ ===== 画面切替 ===== /
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/ ===== カットイン ===== /
function cutin(text){
  return new Promise(r=>{
    chiImg.src = chi.img;
    chiText.textContent = "チー娘「"+text+"」";
    cutinDiv.classList.remove("hidden");
    setTimeout(()=>{
      cutinDiv.classList.add("hidden");
      r();
    },800);
  });
}
const cutinDiv = document.getElementById("cutin");

/ ===== 属性 ===== */
function setAttr(img){
  const list=["fire","water","thunder","dark"];
  const a=list[Math.floor(Math.random()4)];
  img.className="";
  img.classList.add("attr-"+a);
}

/ ===== 大会 ===== /
let round=0;
const rounds=["準々決勝","準決勝","決勝","チャンピオン"];

function startTournament(){
  round=0;
  nextBattle();
}

async function nextBattle(){

  show("battle");
  roundText.textContent = rounds[round];

  setAttr(pImg);
  setAttr(eImg);

  const lv=Math.min(3,Math.floor(chi.aff/3));
  await cutin("デカブサ"+chi.lines[lv]);
}

/ ===== 勝敗 ===== /
function nextRound(){

  if(round>=3){
    show("title");
    return;
  }

  round++;
  nextBattle();
}

/ ===== 戦闘 ===== */
function nextBattleResult(){

  const win=Math.random()>0.5;

  show("result");

  if(win){
    resultText.textContent="勝利！";
    mvp.textContent="MVP：デカブサ";
    chi.aff++;
  }else{
    resultText.textContent="敗北…";
    mvp.textContent="";
  }
}

document.querySelector("#battle button").onclick = nextBattleResult;

</script>

</body>
</html>
