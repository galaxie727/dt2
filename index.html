<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>デカブサ大戦</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}
body{
  display:flex;
  justify-content:center;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
[hidden]{display:none!important}

:root{
  --maxw:560px;
  --line:rgba(255,255,255,.12);
  --muted:rgba(255,255,255,.68);
  --panelGlow:0 8px 24px rgba(0,0,0,.35);
}

.app{
  width:100%;
  max-width:var(--maxw);
  min-height:100svh;
  padding:8px 8px 84px;
}
.screen{
  min-height:calc(100svh - 16px);
  display:flex;
  flex-direction:column;
}
.title{
  text-align:center;
  font-size:34px;
  font-weight:900;
  letter-spacing:.04em;
  margin-top:8px;
}
.sub{
  text-align:center;
  font-size:14px;
  color:var(--muted);
  margin-top:10px;
}
.center{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
.btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:15px 14px;
  font-size:18px;
  font-weight:900;
  background:#fff;
  color:#000;
}
.btn:active{transform:scale(.98)}
.btnGhost{
  width:100%;
  border:none;
  border-radius:14px;
  padding:15px 14px;
  font-size:18px;
  font-weight:900;
  background:#1f1f1f;
  color:#fff;
  border:1px solid var(--line);
}
.version{
  text-align:center;
  font-size:12px;
  opacity:.4;
  margin-top:12px;
}
.heroWrap{text-align:center}
.hero{
  width:min(76vw,310px);
  max-width:310px;
  opacity:.97;
  animation:float 4s ease-in-out infinite;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,.45));
}
.copy{
  text-align:center;
  font-size:16px;
  opacity:.85;
  margin:18px 0 22px;
}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0)}
}

.topBar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.backBtn{
  width:auto;
  min-width:92px;
  padding:12px 14px;
  font-size:14px;
  border-radius:12px;
}
.row{
  display:flex;
  gap:8px;
}
.col{min-width:0}
.leftCol{flex:1.08}
.rightCol{flex:.92}

.panel{
  background:linear-gradient(180deg,#141414,#101010);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  box-shadow:var(--panelGlow);
}
.sectionTitle{
  font-size:18px;
  font-weight:900;
  margin:14px 0 10px;
}
.teamInfo{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

.attr-fire{background:rgba(255,110,110,.18)}
.attr-water{background:rgba(100,170,255,.18)}
.attr-grass{background:rgba(90,220,130,.18)}

.modeRow{
  display:flex;
  gap:8px;
  margin:10px 0 2px;
}
.modeBtn{
  flex:1;
  min-width:110px;
  border:none;
  border-radius:12px;
  padding:12px 10px;
  background:#242424;
  color:#fff;
  border:1px solid var(--line);
  font-size:13px;
  font-weight:900;
}
.modeBtn.active{
  background:#fff;
  color:#000;
}

/* 候補カード */
.pickGrid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.pickCardBig{
  border:1px solid rgba(255,255,255,.18);
  border-radius:18px;
  padding:8px 9px;
  background:#101010;
}
.pickCardBig.selected{
  border:2px solid #fff;
  box-shadow:0 0 10px rgba(255,255,255,.28);
}
.cardMain{
  display:grid;
  grid-template-columns:120px 1fr;
  gap:10px;
  align-items:stretch;
  min-height:148px;
}
.cardImgWrap{
  width:120px;
  min-height:148px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.cardImg{
  width:100%;
  height:144px;
  object-fit:contain;
  object-position:center center;
  filter:drop-shadow(0 8px 18px rgba(0,0,0,.45));
  display:block;
}
.cardInfo{
  display:flex;
  flex-direction:column;
  min-width:0;
  padding-top:2px;
}
.cardTopLine{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:8px;
}
.cardName{
  font-size:17px;
  font-weight:900;
  line-height:1.1;
}
.cardAttr{
  padding:4px 9px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.12);
  flex-shrink:0;
}
.cardRole{
  font-size:12px;
  opacity:.82;
  margin-top:2px;
  line-height:1.25;
}
.cardStats{
  font-size:12px;
  margin-top:5px;
  color:#ddd;
  line-height:1.25;
}
.roleRow{
  margin-top:6px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.roleTag{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:#232323;
  font-size:11px;
  font-weight:800;
  color:#f1f1f1;
  line-height:1;
}
.roleTag.type-attack{background:rgba(255,120,120,.12)}
.roleTag.type-tank{background:rgba(120,200,255,.12)}
.roleTag.type-speed{background:rgba(255,220,120,.12)}
.roleTag.type-balance{background:rgba(180,180,180,.12)}
.roleTag.type-finisher{background:rgba(200,120,255,.12)}
.roleTag.type-trick{background:rgba(120,255,200,.12)}
.cardSkill{
  font-size:12px;
  margin-top:7px;
  line-height:1.35;
  color:#f2f2f2;
}
.cardEquip{
  font-size:11px;
  margin-top:6px;
  color:#b8d7ff;
  line-height:1.35;
}
.cardButtons{
  margin-top:auto;
  display:flex;
  gap:6px;
  padding-top:6px;
}
.btnMain,.btnSub,.btnDetail,.btnEquip{
  flex:1;
  border:none;
  border-radius:10px;
  padding:9px 6px;
  font-size:12px;
  font-weight:900;
  min-height:40px;
}
.btnMain{background:#fff;color:#000}
.btnSub{background:#333;color:#fff}
.btnDetail{background:#555;color:#fff}
.btnEquip{background:#2b2b2b;color:#fff}

/* 並び */
.teamList{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.teamSlot{
  background:#1d1d1d;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  display:grid;
  grid-template-columns:42px 54px 1fr 58px;
  gap:10px;
  align-items:center;
}
.slotNum{
  width:42px;
  height:42px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#202020;
  border:1px solid var(--line);
  font-weight:900;
  font-size:14px;
}
.slotThumb{
  width:54px;
  height:54px;
  border-radius:12px;
  object-fit:cover;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.slotMain{min-width:0}
.slotName{
  font-size:15px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.slotMeta{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}
.slotEquip{
  font-size:10px;
  color:#b8d7ff;
  margin-top:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.slotEmpty{color:rgba(255,255,255,.35)}
.moveBtns{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.moveBtn{
  border:none;
  border-radius:10px;
  background:#2a2a2a;
  color:#fff;
  font-weight:900;
  padding:7px 0;
  border:1px solid var(--line);
  font-size:12px;
}
.moveBtn:disabled{opacity:.28}
.removeBtn{
  margin-top:6px;
  border:none;
  border-radius:10px;
  background:#1d1d1d;
  color:#fff;
  border:1px solid var(--line);
  padding:8px 0;
  font-size:12px;
  font-weight:900;
  width:100%;
}
.bottomActions{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.buildHint{
  margin-top:10px;
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  font-size:13px;
  line-height:1.65;
  white-space:pre-line;
}

/* デッキ */
.deckBox,.shareBox{
  margin-top:14px;
  padding:12px;
  border-radius:16px;
  background:#111;
  border:1px solid var(--line);
}
#deckList{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}
.deckSlot{
  flex:1;
  padding:10px;
  border-radius:12px;
  background:#222;
  text-align:center;
  cursor:pointer;
  border:2px solid transparent;
  font-size:12px;
  font-weight:900;
}
.deckSlot.active{
  border-color:#fff;
}
#deckName,#deckCode{
  width:100%;
  border:none;
  border-radius:12px;
  background:#222;
  color:#fff;
  padding:10px;
  font-size:12px;
}
#deckCode{
  min-height:86px;
  resize:vertical;
  line-height:1.5;
}
.deckBtns{
  display:flex;
  gap:8px;
  margin-top:8px;
}
.deckBtns button{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#333;
  color:#fff;
  font-size:12px;
  font-weight:900;
}

/* 図鑑 */
.dexList{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.dexRow{
  display:grid;
  grid-template-columns:56px 1fr auto;
  gap:10px;
  align-items:center;
  background:#1b1b1b;
  border:1px solid var(--line);
  border-radius:12px;
  padding:8px;
  cursor:pointer;
}
.dexThumb{
  width:56px;
  height:56px;
  object-fit:contain;
  border-radius:10px;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.dexName{
  font-size:14px;
  font-weight:900;
}
.dexMini{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}
.dexAttr{
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.12);
}
.dexHero{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:190px;
}
.dexHero img{
  max-width:220px;
  max-height:180px;
  object-fit:contain;
  filter:drop-shadow(0 12px 28px rgba(0,0,0,.45));
}
.dexDetailName{
  font-size:26px;
  font-weight:900;
  text-align:center;
}
.dexDetailAttr{
  margin:8px auto 0;
  width:max-content;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.14);
}
.dexRole{
  text-align:center;
  font-size:14px;
  color:#ddd;
  margin-top:8px;
}
.dexStatsGrid{
  margin-top:14px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
.dexStat{
  background:#171717;
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
}
.dexStatLabel{
  font-size:11px;
  color:var(--muted);
}
.dexStatValue{
  font-size:18px;
  font-weight:900;
  margin-top:4px;
}
.dexBlock{
  margin-top:12px;
  background:#171717;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
}
.dexBlockTitle{
  font-size:13px;
  font-weight:900;
  margin-bottom:6px;
}
.dexText{
  font-size:13px;
  line-height:1.65;
  color:#eee;
  white-space:pre-line;
}

/* 装備 */
.skillList{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.skillCard{
  background:#171717;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}
.skillCard.active{
  outline:2px solid rgba(255,255,255,.55);
}
.skillName{
  font-size:15px;
  font-weight:900;
}
.skillDesc{
  font-size:12px;
  line-height:1.55;
  color:#ddd;
  margin-top:6px;
}
.skillBtns{
  display:flex;
  gap:8px;
  margin-top:10px;
}

/* 予測 */
.predictTopBox{
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
}
.predictTopTitle{
  font-size:13px;
  color:var(--muted);
}
.predictTopName{
  margin-top:4px;
  font-size:22px;
  font-weight:900;
}
.predictTopMeta{
  margin-top:6px;
  font-size:13px;
  line-height:1.7;
}
.testEnemyGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
.testEnemyCard{
  background:#161616;
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  text-align:center;
}
.testEnemyCard img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
  border-radius:12px;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.testEnemyName{
  font-size:18px;
  font-weight:900;
  margin-top:8px;
}
.testEnemyAttr{
  font-size:12px;
  color:#ddd;
  margin-top:2px;
}
.testEnemyStats{
  font-size:12px;
  line-height:1.55;
  color:#ddd;
  margin-top:8px;
  white-space:pre-line;
}
.testEnemySkill{
  font-size:11px;
  line-height:1.5;
  color:#b8d7ff;
  margin-top:8px;
  white-space:pre-line;
}
.testEnemyBtn{
  margin-top:10px;
  width:100%;
  border:none;
  border-radius:12px;
  padding:12px 8px;
  background:#fff;
  color:#000;
  font-size:13px;
  font-weight:900;
}

/* 予測ポップ */
.modalWrap{
  position:fixed;
  inset:0;
  z-index:999;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(0,0,0,.56);
  backdrop-filter:blur(2px);
}
.modalCard{
  width:min(100%,520px);
  background:linear-gradient(180deg,#1a1a1a,#111);
  border:1px solid rgba(255,255,255,.14);
  border-radius:20px;
  padding:16px;
  box-shadow:0 18px 40px rgba(0,0,0,.42);
}
.modalTitle{
  font-size:24px;
  font-weight:900;
  text-align:center;
}
.modalLead{
  margin-top:8px;
  text-align:center;
  font-size:18px;
  font-weight:900;
}
.modalGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:14px;
}
.modalMini{
  background:#141414;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}
.modalMiniTitle{
  font-size:12px;
  color:var(--muted);
}
.modalMiniName{
  margin-top:4px;
  font-size:18px;
  font-weight:900;
}
.modalMiniMeta{
  margin-top:8px;
  font-size:12px;
  line-height:1.65;
  white-space:pre-line;
}
.modalBtns{
  display:flex;
  gap:10px;
  margin-top:16px;
}
.modalBtns button{
  flex:1;
  border:none;
  border-radius:12px;
  padding:12px;
  font-weight:900;
  font-size:14px;
}
.modalClose{
  background:#333;
  color:#fff;
}
.modalGo{
  background:#fff;
  color:#000;
}

/* バトル */
.battleMeta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.metaPill{
  padding:7px 10px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#171717;
  font-size:11px;
  color:#ddd;
}
.alivePill{font-weight:900}
.aliveGood{color:#b8ffd1}
.aliveBad{color:#ffc1c1}

.statusBoardWrap{
  position:relative;
  margin-bottom:12px;
}
.statusBoard{
  background:linear-gradient(180deg,#141414,#101010);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  box-shadow:var(--panelGlow);
  position:relative;
  z-index:1;
}
.statusLines{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:2;
}
.statusHead{
  display:grid;
  grid-template-columns:1fr 44px 1fr;
  gap:8px;
  align-items:center;
  margin-bottom:8px;
}
.statusHead .label{
  font-size:13px;
  font-weight:900;
  color:#ddd;
}
.statusHead .label.right{text-align:right}
.statusRows{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.statusRow{
  display:grid;
  grid-template-columns:1fr 44px 1fr;
  gap:8px;
  align-items:center;
}
.miniSideCard{
  background:#1a1a1a;
  border:1px solid var(--line);
  border-radius:12px;
  padding:8px;
  min-height:58px;
  display:grid;
  grid-template-columns:40px 1fr auto;
  gap:8px;
  align-items:center;
}
.miniSideCard.right{grid-template-columns:auto 1fr 40px}
.miniSideCard.dead{
  opacity:.25;
  filter:grayscale(1);
}
.miniSideCard.active{
  outline:2px solid rgba(255,255,255,.55);
  box-shadow:0 0 0 3px rgba(255,255,255,.08);
}
.miniSideCard img{
  width:40px;
  height:40px;
  border-radius:10px;
  object-fit:cover;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.miniSideCard.playerSide img{transform:scaleX(-1)}
.miniSideCard.enemySide img{transform:scaleX(1)}
.miniSideMain{min-width:0}
.miniSideName{
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.miniSideMeta{
  font-size:10px;
  color:var(--muted);
  margin-top:2px;
}
.miniSideBadge{
  font-size:11px;
  font-weight:900;
  color:#fff;
}
.boardVs{
  display:flex;
  align-items:center;
  justify-content:center;
}
.boardLink{
  width:100%;
  height:2px;
  background:rgba(255,255,255,.18);
}
.boardLink.active{
  background:rgba(255,255,255,.75);
  box-shadow:0 0 10px rgba(255,255,255,.22);
}

.battleTop{
  display:grid;
  grid-template-columns:1fr 64px 1fr;
  gap:10px;
  align-items:stretch;
  margin-bottom:10px;
}
.sideLabel{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}
.vs{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:900;
  opacity:.95;
}
.fighterCard{
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  min-height:286px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:var(--panelGlow);
  position:relative;
  overflow:hidden;
}
.fighterCard.fire{
  background:
    radial-gradient(circle at 30% 20%, rgba(255,90,90,.20), transparent 42%),
    linear-gradient(180deg,#251313,#120d0d);
}
.fighterCard.water{
  background:
    radial-gradient(circle at 30% 20%, rgba(90,150,255,.20), transparent 42%),
    linear-gradient(180deg,#101a2a,#0c1018);
}
.fighterCard.grass{
  background:
    radial-gradient(circle at 30% 20%, rgba(90,220,130,.18), transparent 42%),
    linear-gradient(180deg,#112317,#0b120d);
}
.fighterCard.none{
  background:linear-gradient(180deg,#171717,#101010);
}
.fighterHeader{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:0;
}
.fighterBadges{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.fighterBadges.right{justify-content:flex-end}
.infoBadge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.08);
  font-size:11px;
  font-weight:900;
}
.badge-attr-fire{background:rgba(255,123,123,.12)}
.badge-attr-water{background:rgba(115,169,255,.12)}
.badge-attr-grass{background:rgba(100,220,130,.12)}
.badge-good{background:rgba(120,225,160,.16);color:#b8ffd1}
.badge-bad{background:rgba(255,127,127,.16);color:#ffc1c1}
.badge-even{background:rgba(255,255,255,.08);color:#eee}
.fighterName{
  font-size:20px;
  font-weight:900;
  line-height:1.1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.fighterRole{
  font-size:14px;
  color:#b8c8ff;
  line-height:1.2;
}
.fighterEquip{
  font-size:11px;
  color:#d7e6ff;
  line-height:1.35;
}
.fighterBody{
  flex:1;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  min-height:140px;
  padding-bottom:6px;
}
.fighterVisual{
  width:150px;
  height:140px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}
.fighterImg{
  max-width:100%;
  max-height:140px;
  object-fit:contain;
  filter:drop-shadow(0 8px 18px rgba(0,0,0,.45));
}
.fighterVisual.player .fighterImg{transform:scaleX(-1)}
.hpWrap{margin-top:8px}
.hpRow{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-bottom:5px;
}
.hpBar{
  width:100%;
  height:12px;
  background:#292929;
  border-radius:999px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
}
.hpFill{
  height:100%;
  width:100%;
  background:#fff;
  transition:width .28s ease;
}
.hpFill.low{background:#ff7b7b}
.hpFill.mid{background:#ffd24d}
.hpFill.high{background:#77e0a0}
.logPanel{
  flex:1;
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  overflow:auto;
  min-height:210px;
  max-height:32svh;
}
.logLine{
  font-size:13px;
  line-height:1.65;
  padding:4px 0;
  border-bottom:1px dashed rgba(255,255,255,.06);
}
.battleActions{
  margin-top:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.speedRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.speedBtn{
  flex:1;
  min-width:84px;
  border:none;
  border-radius:12px;
  padding:10px 8px;
  background:#242424;
  color:#fff;
  border:1px solid var(--line);
  font-size:12px;
  font-weight:900;
}
.speedBtn.active{
  background:#fff;
  color:#000;
}

/* MVPポップ */
.mvpOverlay{
  position:fixed;
  inset:0;
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(0,0,0,.58);
  backdrop-filter:blur(2px);
}
.mvpPanel{
  width:min(100%,520px);
  background:linear-gradient(180deg,#181818,#101010);
  border:1px solid rgba(255,255,255,.16);
  border-radius:18px;
  padding:18px 14px;
  text-align:center;
  box-shadow:0 8px 28px rgba(0,0,0,.38);
}
.mvpCrown{
  font-size:14px;
  font-weight:900;
  color:#ffd95e;
  letter-spacing:.08em;
}
.mvpImageWrap{
  min-height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:10px;
}
.mvpImg{
  max-width:240px;
  max-height:180px;
  object-fit:contain;
  filter:drop-shadow(0 12px 28px rgba(0,0,0,.45));
}
.mvpName{
  font-size:28px;
  font-weight:900;
  margin-top:4px;
}
.mvpStats{
  margin-top:6px;
  font-size:13px;
  line-height:1.6;
  color:#ddd;
  white-space:pre-line;
}
.mvpLine{
  margin-top:8px;
  font-size:15px;
  font-weight:900;
}
.mvpActions{
  display:flex;
  gap:10px;
  margin-top:16px;
}
.mvpActions button{
  flex:1;
  border:none;
  border-radius:12px;
  padding:12px;
  font-weight:900;
  font-size:14px;
}
.mvpClose{
  background:#333;
  color:#fff;
}
.mvpResult{
  background:#fff;
  color:#000;
}

/* 結果 */
.resultTitle{
  font-size:22px;
  font-weight:900;
  text-align:center;
  margin:8px 0 4px;
}
.resultSub{
  text-align:center;
  color:var(--muted);
  font-size:13px;
  margin-bottom:8px;
}
.summaryCard{
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  line-height:1.75;
  font-size:13px;
  white-space:pre-line;
}

@media (max-width:520px){
  .title{font-size:31px}
  .row{flex-direction:column}
  .statusHead{grid-template-columns:1fr 34px 1fr;gap:6px}
  .statusRow{grid-template-columns:1fr 34px 1fr;gap:6px}
  .miniSideCard{
    min-height:54px;
    grid-template-columns:36px 1fr auto;
    padding:7px;
  }
  .miniSideCard.right{grid-template-columns:auto 1fr 36px}
  .miniSideCard img{
    width:36px;
    height:36px;
  }
  .battleTop{grid-template-columns:1fr 48px 1fr;gap:8px}
  .vs{font-size:22px}
  .fighterCard{min-height:252px;padding:12px}
  .fighterName{font-size:16px}
  .fighterBody{min-height:128px;padding-bottom:4px}
  .fighterVisual{width:128px;height:128px}
  .fighterImg{max-width:128px;max-height:128px}
}
</style>
</head>
<body>
<div class="app">

<section id="screenTitle" class="screen">
  <div class="title">デカブサ大戦</div>
  <div class="sub">5対5 団体オートバトル</div>
  <div class="center">
    <div class="heroWrap">
      <img class="hero" src="./dekabusa_title.png" alt="デカブサ大戦" onerror="this.src='./dekabusa.png';this.onerror=null;">
      <div class="copy">並びだけ決めろ</div>
      <button class="btn" onclick="goBuild()">START</button>
      <div class="version">ver 10.3</div>
    </div>
  </div>
</section>

<section id="screenBuild" class="screen" hidden>
  <div class="topBar">
    <button class="btnGhost backBtn" onclick="goTitle()">戻る</button>
    <div style="text-align:right">
      <div style="font-size:18px;font-weight:900">好きな順に並べろ。</div>
      <div class="teamInfo">5体まで選択可能</div>
    </div>
  </div>

  <div class="panel" style="margin-bottom:10px">
    <div class="sectionTitle" style="margin-top:0">バトルモード</div>
    <div class="modeRow">
      <button id="modeSurvivalBtn" class="modeBtn active" onclick="setBattleMode('survival')">勝ち抜き</button>
      <button id="modeFixedBtn" class="modeBtn" onclick="setBattleMode('fixed')">対面固定</button>
    </div>
    <div id="modeHint" class="teamInfo">勝ったキャラが残って次と戦う</div>
  </div>

  <div class="row">
    <div class="col leftCol">
      <div class="panel">
        <div class="sectionTitle">候補キャラ</div>
        <div id="pickGrid" class="pickGrid"></div>
      </div>
    </div>

    <div class="col rightCol">
      <div class="panel">
        <div class="sectionTitle">現在の並び</div>
        <div class="teamInfo">先鋒 → 次鋒 → 中堅 → 副将 → 大将</div>
        <div id="teamList" class="teamList"></div>

        <div class="bottomActions">
          <button id="confirmBtn" class="btn" onclick="startBattle()" disabled>この並びでいく</button>
          <button class="btnGhost" onclick="fillRandom()">ランダムで埋める</button>
          <button class="btnGhost" onclick="clearTeam()">全て外す</button>
          <button class="btnGhost" onclick="goDexList()">キャラ図鑑</button>
        </div>

        <div id="buildHint" class="buildHint">並び特徴をここに表示</div>
      </div>

      <div class="deckBox">
        <div class="sectionTitle" style="margin-top:0">マイデッキ</div>
        <div id="deckList"></div>
        <input id="deckName" placeholder="デッキ名">
        <div class="deckBtns">
          <button onclick="saveDeck()">保存</button>
          <button onclick="loadDeck()">読み込み</button>
          <button onclick="deleteDeck()">削除</button>
        </div>
      </div>

      <div class="shareBox">
        <div class="sectionTitle" style="margin-top:0">デッキ共有</div>
        <textarea id="deckCode" placeholder="ここにデッキコードを表示 / 貼り付け"></textarea>
        <div class="deckBtns">
          <button onclick="exportDeckCode()">コード作成</button>
          <button onclick="copyDeckCode()">コピー</button>
          <button onclick="importDeckCode()">読み込み</button>
        </div>
      </div>
    </div>
  </div>
</section>

<section id="screenDexList" class="screen" hidden>
  <div class="topBar">
    <button class="btnGhost backBtn" onclick="goBuild()">戻る</button>
    <div style="text-align:right">
      <div style="font-size:18px;font-weight:900">キャラ図鑑</div>
    </div>
  </div>
  <div class="panel">
    <div id="dexList" class="dexList"></div>
  </div>
</section>

<section id="screenDexDetail" class="screen" hidden>
  <div class="topBar">
    <button class="btnGhost backBtn" onclick="goDexList()">戻る</button>
  </div>

  <div class="panel">
    <div class="dexHero">
      <img id="dexImg" alt="">
    </div>
    <div id="dexName" class="dexDetailName"></div>
    <div id="dexAttr" class="dexDetailAttr"></div>
    <div id="dexRole" class="dexRole"></div>
    <div id="dexStats" class="dexStatsGrid"></div>

    <div class="dexBlock">
      <div class="dexBlockTitle">スキル</div>
      <div id="dexSkill" class="dexText"></div>
    </div>

    <div class="dexBlock">
      <div class="dexBlockTitle">説明</div>
      <div id="dexDesc" class="dexText"></div>
    </div>
  </div>
</section>

<section id="screenEquip" class="screen" hidden>
  <div class="topBar">
    <button class="btnGhost backBtn" onclick="goBuild()">編成へ</button>
    <div style="text-align:right">
      <div id="equipTitle" style="font-size:18px;font-weight:900">装備技変更</div>
      <div class="teamInfo">3つの中から1つ選ぶ</div>
    </div>
  </div>
  <div class="panel">
    <div id="skillList" class="skillList"></div>
  </div>
</section>

<section id="screenTestEnemy" class="screen" hidden>
  <div class="topBar">
    <button class="btnGhost backBtn" onclick="goBuild()">編成へ</button>
    <div style="text-align:right">
      <div style="font-size:18px;font-weight:900">相手を選んで予測</div>
    </div>
  </div>

  <div class="predictTopBox">
    <div class="predictTopTitle">あなた</div>
    <div id="predictSelfName" class="predictTopName">-</div>
    <div id="predictSelfMeta" class="predictTopMeta">-</div>
  </div>

  <div class="panel">
    <div id="testEnemyGrid" class="testEnemyGrid"></div>
  </div>
</section>

<section id="screenBattle" class="screen" hidden>
  <div class="topBar">
    <button class="btnGhost backBtn" onclick="backToBuildFromBattle()">編成へ</button>
    <div style="text-align:right">
      <div style="font-size:18px;font-weight:900">オート対戦</div>
    </div>
  </div>

  <div class="battleMeta">
    <div id="alivePlayer" class="metaPill alivePill aliveGood"></div>
    <div id="aliveEnemy" class="metaPill alivePill aliveBad"></div>
    <div id="turnInfo" class="metaPill"></div>
  </div>

  <div class="statusBoardWrap">
    <div class="statusBoard">
      <div class="statusHead">
        <div class="label">自分</div>
        <div></div>
        <div class="label right">相手</div>
      </div>
      <div id="statusRows" class="statusRows"></div>
    </div>
    <svg class="statusLines"></svg>
  </div>

  <div class="battleTop">
    <div>
      <div class="sideLabel">あなた</div>
      <div id="playerCard" class="fighterCard none">
        <div class="fighterHeader">
          <div class="fighterBadges" id="playerBadges"></div>
          <div id="playerName" class="fighterName"></div>
          <div id="playerRole" class="fighterRole"></div>
          <div id="playerEquip" class="fighterEquip"></div>
        </div>
        <div class="fighterBody">
          <div id="playerVisual" class="fighterVisual player">
            <img id="playerImg" class="fighterImg" alt="">
          </div>
        </div>
        <div class="hpWrap">
          <div class="hpRow">
            <span>HP</span>
            <span id="playerHpText"></span>
          </div>
          <div class="hpBar">
            <div id="playerHp" class="hpFill"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="vs">VS</div>

    <div>
      <div class="sideLabel" style="text-align:right">敵</div>
      <div id="enemyCard" class="fighterCard none">
        <div class="fighterHeader">
          <div class="fighterBadges right" id="enemyBadges"></div>
          <div id="enemyName" class="fighterName" style="text-align:right"></div>
          <div id="enemyRole" class="fighterRole" style="text-align:right"></div>
          <div id="enemyEquip" class="fighterEquip" style="text-align:right"></div>
        </div>
        <div class="fighterBody">
          <div id="enemyVisual" class="fighterVisual enemy">
            <img id="enemyImg" class="fighterImg" alt="">
          </div>
        </div>
        <div class="hpWrap">
          <div class="hpRow">
            <span id="enemyHpText"></span>
            <span>HP</span>
          </div>
          <div class="hpBar">
            <div id="enemyHp" class="hpFill"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="log" class="logPanel"></div>

  <div class="battleActions">
    <div class="speedRow">
      <button class="speedBtn active" onclick="setSpeed(1)">等速</button>
      <button class="speedBtn" onclick="setSpeed(2)">2倍</button>
      <button class="speedBtn" onclick="setSpeed(4)">4倍</button>
    </div>
    <button class="btnGhost" onclick="skipBattle()">スキップ</button>
    <button id="resultViewBtn" class="btn" onclick="goResult()" hidden>結果を見る</button>
  </div>
</section>

<section id="screenResult" class="screen" hidden>
  <div class="resultTitle" id="resultTitle"></div>
  <div class="resultSub" id="resultSub"></div>
  <div id="summary" class="summaryCard"></div>

  <div class="battleActions">
    <button class="btn" onclick="goBuild()">もう一度</button>
    <button class="btnGhost" onclick="goTitle()">タイトルへ</button>
  </div>
</section>

<div id="predictModal" class="modalWrap" hidden>
  <div class="modalCard">
    <div class="modalTitle">予測結果</div>
    <div id="predictLead" class="modalLead">-</div>
    <div class="modalGrid">
      <div class="modalMini">
        <div class="modalMiniTitle">あなた</div>
        <div id="predictMyName" class="modalMiniName">-</div>
        <div id="predictMyMeta" class="modalMiniMeta">-</div>
      </div>
      <div class="modalMini">
        <div class="modalMiniTitle">相手</div>
        <div id="predictEnemyName" class="modalMiniName">-</div>
        <div id="predictEnemyMeta" class="modalMiniMeta">-</div>
      </div>
    </div>
    <div class="modalBtns">
      <button class="modalClose" onclick="closePredictModal()">閉じる</button>
      <button class="modalGo" onclick="closePredictModal()">OK</button>
    </div>
  </div>
</div>

<div id="mvpOverlay" class="mvpOverlay" hidden>
  <div class="mvpPanel">
    <div class="mvpCrown">MVP</div>
    <div class="mvpImageWrap">
      <img id="mvpImg" class="mvpImg" alt="">
    </div>
    <div id="mvpName" class="mvpName"></div>
    <div id="mvpStats" class="mvpStats"></div>
    <div id="mvpLine" class="mvpLine"></div>
    <div class="mvpActions">
      <button class="mvpClose" onclick="closeMvpOverlay()">閉じる</button>
      <button class="mvpResult" onclick="openResultFromMvp()">結果を見る</button>
    </div>
  </div>
</div>

</div>

<script>
const characters = [
  {id:"dekabusa",name:"デカブサ",attr:"water",role:"安定",roleType:"balance",hp:130,atk:25,def:22,spd:8,img:"./dekabusa.png",passive:"背水：HP50%以下で与ダメージ+50%",desc:"耐久寄りの安定型。",mvpLine:"まあ、こんな日もある。",skills:[{id:"db_hp",name:"しぶとい",desc:"最大HP+10",effect:{hp:10}},{id:"db_atk",name:"重い一撃",desc:"攻撃+4",effect:{atk:4}},{id:"db_guard",name:"ねばる",desc:"初回被ダメージ-20%",effect:{firstReduce:0.2}}]},

function attrLabel(attr){ if(attr==="fire")return"火"; if(attr==="water")return"水"; if(attr==="grass")return"草"; return""; }
function attrClass(attr){ if(attr==="fire")return"attr-fire"; if(attr==="water")return"attr-water"; if(attr==="grass")return"attr-grass"; return""; }
function attrCardClass(attr){ if(attr==="fire")return"fire"; if(attr==="water")return"water"; if(attr==="grass")return"grass"; return"none"; }
function roleTypeLabel(type){ if(type==="attack")return"攻撃"; if(type==="tank")return"耐久"; if(type==="speed")return"先手"; if(type==="balance")return"万能"; if(type==="finisher")return"後半"; return"搦手"; }

  const ch = getChar(charId);
  if(!ch) return null;

}
function roleTagHtml(ch){

}
function getAttrRate(a,d){
  if(a==="water"&&d==="fire") return 1.2;
  if(a==="fire"&&d==="grass") return 1.2;
  if(a==="grass"&&d==="water") return 1.2;
  if(a==="fire"&&d==="water") return 0.8;
  if(a==="grass"&&d==="fire") return 0.8;
  if(a==="water"&&d==="grass") return 0.8;
  return 1;
}
function matchupText(a,b){
  const r=getAttrRate(a.attr,b.attr);
  if(r>1) return {text:"有利",cls:"badge-good"};
  if(r<1) return {text:"不利",cls:"badge-bad"};
  return {text:"五分",cls:"badge-even"};
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildTeamHint(){
  if(team.length===0) return "並び特徴\nまだ未選択";
  const arr=team.map(getChar);
  const avgSpd=arr.reduce((s,v)=>s+v.spd,0)/arr.length;
  const avgDef=arr.reduce((s,v)=>s+v.def,0)/arr.length;
  const first=arr[0];
  const last=arr[arr.length-1];
  const lines=[];
  lines.push("並び特徴");
  lines.push(`モード：${battleMode==="survival"?"勝ち抜き":"対面固定"}`);
  if(avgSpd>=15) lines.push("全体：先手寄り");
  else if(avgDef>=21) lines.push("全体：耐久寄り");
  else lines.push("全体：バランス");
  if(first) lines.push(`先鋒向き：${first.name}（${first.role}）`);
  if(last && arr.length>=3) lines.push(`後半の鍵：${last.name}（${last.role}）`);
  lines.push(battleMode==="fixed"?"固定戦では相性が重要":"勝ち抜きでは連戦向きの配置が重要");
  return lines.join("\n");
}

function predictBattle(enemyId){
  const p=cloneFighter(getChar(testPlayerId),"player",0);
  const e=cloneFighter(getChar(enemyId),"enemy",0);
  let turn=0;

  while(p.alive && e.alive && turn<20){
    turn++;
    const first=decideFirst(p,e);
    const second=first===p?e:p;
    p.flags.isFirstThisTurn=(first===p);
    e.flags.isFirstThisTurn=(first===e);

    const r1=calcDamage(first,second);
    if(r1.damage>0){
      second.currentHp-=r1.damage;
      if(second.currentHp<=0){ second.currentHp=0; second.alive=false; }
    }
    if(second.alive){
      const r2=calcDamage(second,first);
      if(r2.damage>0){
        first.currentHp-=r2.damage;
        if(first.currentHp<=0){ first.currentHp=0; first.alive=false; }
      }
    }
  }

  let lead="ほぼ互角";
  if(p.alive && !e.alive) lead=`${p.name}優勢`;
  else if(!p.alive && e.alive) lead=`${e.name}優勢`;
  else if(p.currentHp > e.currentHp) lead=`${p.name}やや優勢`;
  else if(e.currentHp > p.currentHp) lead=`${e.name}やや優勢`;

  const psk=getEquippedSkill(p.id);
  const esk=getEquippedSkill(e.id);

  document.getElementById("predictLead").textContent=lead;
  document.getElementById("predictMyName").textContent=p.name;
  document.getElementById("predictEnemyName").textContent=e.name;
  document.getElementById("predictMyMeta").textContent=
    `${attrLabel(p.attr)} / ${p.role}\nHP ${Math.max(0,p.currentHp)} / ${p.maxHp}\n攻 ${p.atk} / 防 ${p.def} / 速 ${p.spd}\n技：${psk.name}`;
  document.getElementById("predictEnemyMeta").textContent=
    `${attrLabel(e.attr)} / ${e.role}\nHP ${Math.max(0,e.currentHp)} / ${e.maxHp}\n攻 ${e.atk} / 防 ${e.def} / 速 ${e.spd}\n技：${esk.name}`;
  document.getElementById("predictModal").hidden=false;
}

function loadDeck(){
  const data=getDeckData();

  team=[...data[selectedSlot].team];
  const skills=data[selectedSlot].skills||{};
  Object.keys(skills).forEach(id=>equippedSkills[id]=skills[id]);

  renderAll();
  setBattleMode(battleMode);
}

  const data=getDeckData();
  data[selectedSlot]=null;
  saveDeckData(data);
  renderDeckSlots(data);
}
function exportDeckCode(){
  const payload={v:1,mode:battleMode,team:team.map(id=>({id,skill:equippedSkills[id]||null}))};
  const code=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  document.getElementById("deckCode").value=code;
}
async function copyDeckCode(){
  const el=document.getElementById("deckCode");
  if(!el.value) return alert("先にコード作成してください");
  try{
    await navigator.clipboard.writeText(el.value);
    alert("コピーしました");
  }catch(e){
    el.select();
    document.execCommand("copy");
    alert("コピーしました");
  }
}
function importDeckCode(){
  const code=document.getElementById("deckCode").value.trim();
  if(!code) return alert("コードを貼ってください");
  try{
    const json=decodeURIComponent(escape(atob(code)));
    const data=JSON.parse(json);
    if(!data.team || !Array.isArray(data.team)) throw new Error("bad");
    const nextTeam=[];
    const nextSkills={};
    for(const item of data.team){
      if(!getChar(item.id)) continue;
      nextTeam.push(item.id);
      const ch=getChar(item.id);
      const hasSkill=ch.skills.some(s=>s.id===item.skill);
      nextSkills[item.id]=hasSkill?item.skill:ch.skills[0].id;
    }
    if(nextTeam.length!==5) return alert("5体編成のコードではありません");
    team=nextTeam;
    Object.keys(nextSkills).forEach(id=>equippedSkills[id]=nextSkills[id]);
    if(data.mode==="survival" || data.mode==="fixed") battleMode=data.mode;
    renderAll();
    setBattleMode(battleMode);
    alert("デッキを読み込みました");
  }catch(e){
    alert("コードが不正です");
  }
}

/* 戦闘 */
function applySkillToClone(fighter){
  const skill=getEquippedSkill(fighter.id);
  fighter.equippedSkill=skill;
  const ef=skill?.effect||{};
  if(ef.hp) fighter.hp+=ef.hp;
  if(ef.atk) fighter.atk+=ef.atk;
  if(ef.def) fighter.def+=ef.def;
  if(ef.spd) fighter.spd+=ef.spd;
  fighter.maxHp=fighter.hp;
  fighter.currentHp=fighter.hp;
  return fighter;
}
function cloneFighter(char,side,orderIndex){
  return applySkillToClone({
    ...JSON.parse(JSON.stringify(char)),
    side,orderIndex,
    maxHp:char.hp,currentHp:char.hp,alive:true,
    wins:0,damageDealt:0,damageTaken:0,turns:0,matchWin:0,
    flags:{firstAttackDone:false,firstHitTaken:false,aniBoost:0,counterReady:false,isFirstThisTurn:false,firstEvadeUsed:false,evadeBuff:false}
  });
}
function scoreForAI(char){
  let score=0;
  score+=char.hp*0.7;
  score+=char.atk*1.15;
  score+=char.def*0.8;
  score+=char.spd*0.65;
  if(char.id==="ratel") score+=18;
  if(char.id==="kanemon") score+=10;
  if(char.id==="namaken") score+=10;
  if(char.id==="ani") score+=16;
  if(char.id==="kabao") score+=15;
  if(char.id==="king") score+=12;
  return score;
}
function makeEnemyTeam(){
  const pool=characters.map(c=>c.id).filter(id=>!team.includes(id));
  let enemyChars=shuffle(pool).slice(0,5).map(id=>getChar(id));
  enemyChars.sort((a,b)=>scoreForAI(b)-scoreForAI(a));
  return enemyChars.map(c=>c.id);
}
function effectiveSpeed(f){
  const fatigueRate=1-Math.min(f.wins*0.05,0.15);
  return Math.max(1,Math.round(f.spd*fatigueRate));
}
function decideFirst(a,b){
  const aSpd=effectiveSpeed(a), bSpd=effectiveSpeed(b), diff=aSpd-bSpd;
  let aRate=0.5;
  if(diff>=12) aRate=0.75;
  else if(diff>=6) aRate=0.65;
  else if(diff>=3) aRate=0.58;
  else if(diff<=-12) aRate=0.25;
  else if(diff<=-6) aRate=0.35;
  else if(diff<=-3) aRate=0.42;
  return Math.random()<aRate?a:b;
}
function calcDamage(attacker,defender){
  if(!attacker.alive || !defender.alive) return {damage:0,isCrit:false,attrRate:1};

  let evadeRate=0;
  if(defender.id==="tora") evadeRate+=0.20;
  if(defender.equippedSkill?.effect?.firstEvadePlus && !defender.flags.firstEvadeUsed) evadeRate+=defender.equippedSkill.effect.firstEvadePlus;
  if(Math.random()<evadeRate){
    defender.flags.firstEvadeUsed=true;
    if(defender.equippedSkill?.effect?.evadeAttackBonus) defender.flags.evadeBuff=true;
    return {damage:0,isCrit:false,attrRate:1,evaded:true};
  }

  let skillRate=1.0;
  if(attacker.id==="dekabusa" && attacker.currentHp<=attacker.maxHp*0.5) skillRate*=1.5;
  if(attacker.id==="kanemon" && !attacker.flags.firstAttackDone) skillRate*=1.4;
  if(attacker.id==="king" && defender.currentHp<=defender.maxHp*0.3) skillRate*=1.4;
  if(attacker.id==="namaken" && defender.currentHp===defender.maxHp) skillRate*=1.5;
  if(attacker.id==="ani") skillRate*=(1+attacker.flags.aniBoost);
  if(attacker.id==="juzo" && attacker.flags.counterReady){ skillRate*=1.5; attacker.flags.counterReady=false; }
  if(attacker.id==="ratel" && attacker.flags.isFirstThisTurn) skillRate*=1.3;
  if(attacker.id==="gori") skillRate*=1.1;

  if(attacker.id==="panpan"){
    let missRate=0.15;
    if(attacker.equippedSkill?.effect?.missMinus) missRate-=attacker.equippedSkill.effect.missMinus;
    if(Math.random()<missRate){ attacker.flags.firstAttackDone=true; return {damage:0,isCrit:false,attrRate:1,missed:true}; }
    let rageRate=0.35;
    if(attacker.equippedSkill?.effect?.ragePlus) rageRate+=attacker.equippedSkill.effect.ragePlus;
    if(Math.random()<rageRate) skillRate*=1.7;
  }

  if(attacker.equippedSkill?.effect?.lowHpAtk && attacker.currentHp<=attacker.maxHp*0.5){
    skillRate*=1+(attacker.equippedSkill.effect.lowHpAtk/Math.max(1,attacker.atk));
  }
  if(attacker.equippedSkill?.effect?.bonusVsGrass && defender.attr==="grass") skillRate*=1+attacker.equippedSkill.effect.bonusVsGrass;
  if(attacker.equippedSkill?.effect?.bonusVsWater && defender.attr==="water") skillRate*=1+attacker.equippedSkill.effect.bonusVsWater;
  if(attacker.equippedSkill?.effect?.chaseBonus && defender.currentHp<=defender.maxHp*0.5) skillRate*=1+attacker.equippedSkill.effect.chaseBonus;
  if(attacker.equippedSkill?.effect?.midHpBonus && defender.currentHp<=defender.maxHp*0.5) skillRate*=1+attacker.equippedSkill.effect.midHpBonus;
  if(attacker.equippedSkill?.effect?.slowAttackBonus && effectiveSpeed(attacker)<effectiveSpeed(defender)) skillRate*=1+attacker.equippedSkill.effect.slowAttackBonus;
  if(attacker.equippedSkill?.effect?.secondAttackBonus && !attacker.flags.isFirstThisTurn) skillRate*=1+attacker.equippedSkill.effect.secondAttackBonus;
  if(attacker.equippedSkill?.effect?.lateTurnBonus && attacker.turns>=2) skillRate*=1+attacker.equippedSkill.effect.lateTurnBonus;
  if(attacker.flags.evadeBuff){ skillRate*=1.2; attacker.flags.evadeBuff=false; }

  let defendRate=1.0;
  if(defender.id==="gori" && !defender.flags.firstHitTaken) defendRate*=0.5;
  if(defender.id==="nise") defendRate*=0.8;
  if(defender.equippedSkill?.effect?.firstReduce && !defender.flags.firstHitTaken) defendRate*=1-defender.equippedSkill.effect.firstReduce;
  if(defender.equippedSkill?.effect?.reduceFromFire && attacker.attr==="fire") defendRate*=1-defender.equippedSkill.effect.reduceFromFire;
  if(defender.equippedSkill?.effect?.repeatReduce && defender.flags.firstHitTaken) defendRate*=1-defender.equippedSkill.effect.repeatReduce;

  const tempDef=(defender.equippedSkill?.effect?.lowHpDef && defender.currentHp<=defender.maxHp*0.5)?defender.equippedSkill.effect.lowHpDef:0;
  const fatigueAtk=1-Math.min(attacker.wins*0.04,0.12);
  const armorPen=attacker.equippedSkill?.effect?.armorPen||0;
  const effDef=Math.max(0,defender.def+tempDef);
  const base=Math.max(8,(attacker.atk*fatigueAtk)-effDef*(0.5-armorPen));
  const attr=getAttrRate(attacker.attr,defender.attr);
  const rand=0.92+Math.random()*0.16;
  let critRate=0.08;
  if(attacker.equippedSkill?.effect?.critPlus) critRate+=attacker.equippedSkill.effect.critPlus;
  const crit=Math.random()<critRate?1.5:1.0;

  let damage=Math.round(base*attr*skillRate*defendRate*rand*crit);
  damage=Math.max(8,damage);

  attacker.flags.firstAttackDone=true;
  defender.flags.firstHitTaken=true;
  return {damage,isCrit:crit>1,attrRate:attr};
}
function healEndTurn(f){
  if(!f.alive) return null;
  let heal=0;
  if(f.id==="kabao") heal+=8;
  if(f.equippedSkill?.effect?.healBonus) heal+=f.equippedSkill.effect.healBonus;
  if(heal>0){
    const before=f.currentHp;
    f.currentHp=Math.min(f.maxHp,f.currentHp+heal);
    if(f.currentHp>before) return `${f.name}は回復した。`;
  }
  return null;
}
function teamAliveCount(teamArr){ return teamArr.filter(f=>f.alive).length; }
function addLog(text){
  if(!battle) return;
  const panel=document.getElementById("log");
  const div=document.createElement("div");
  div.className="logLine";
  div.textContent=text;
  panel.appendChild(div);
  panel.scrollTop=panel.scrollHeight;
}
function updateHpBar(fillEl,textEl,fighter){
  if(!fighter){ fillEl.style.width="0%"; textEl.textContent="-"; return; }
  const pct=Math.max(0,fighter.currentHp/fighter.maxHp*100);
  fillEl.style.width=pct+"%";
  fillEl.className="hpFill "+(pct<=30?"low":pct<=60?"mid":"high");
  textEl.textContent=`${Math.max(0,fighter.currentHp)} / ${fighter.maxHp}`;
}
function setImg(el,fighter){
  if(!fighter){ el.src=""; return; }
  el.src=fighter.img;
  el.onerror=function(){this.style.opacity=".15"};
  el.style.opacity="1";
}
function renderBadges(targetEl,fighter,matchup){
  if(!fighter){ targetEl.innerHTML=""; return; }
  const attrBadgeClass=fighter.attr==="fire"?"badge-attr-fire":fighter.attr==="water"?"badge-attr-water":"badge-attr-grass";
  targetEl.innerHTML=`
    <span class="infoBadge">${orderLabel(fighter.orderIndex)}</span>
    <span class="infoBadge ${attrBadgeClass}">${attrLabel(fighter.attr)}</span>
    <span class="infoBadge ${matchup.cls}">${matchup.text}</span>
  `;
}
function drawStatusRows(){
  const rows=document.getElementById("statusRows");
  rows.innerHTML="";
  if(!battle) return;
  const labels=["先鋒","次鋒","中堅","副将","大将"];
  for(let i=0;i<5;i++){
    const pf=battle.playerTeam[i];
    const ef=battle.enemyTeam[i];
    const pActive=i===battle.playerActiveIndex;
    const eActive=i===battle.enemyActiveIndex;
    const row=document.createElement("div");
    row.className="statusRow";
    row.innerHTML=`
      <div class="miniSideCard playerSide ${pf && !pf.alive?"dead":""} ${pActive?"active":""}" data-side="player" data-idx="${i}">
        <img src="${pf?pf.img:""}" alt="" onerror="this.style.opacity='.15'">
        <div class="miniSideMain">
          <div class="miniSideName">${labels[i]} ${pf?pf.name:"-"}</div>
          <div class="miniSideMeta">${pf?`${attrLabel(pf.attr)} / HP ${Math.max(0,pf.currentHp)}`:"-"}</div>
        </div>
        <div class="miniSideBadge">${pf?(pf.alive?(pActive?"★":"○"):"×"):""}</div>
      </div>
      <div class="boardVs"><div class="boardLink ${pActive&&eActive?"active":""}"></div></div>
      <div class="miniSideCard right enemySide ${ef && !ef.alive?"dead":""} ${eActive?"active":""}" data-side="enemy" data-idx="${i}">
        <div class="miniSideBadge">${ef?(ef.alive?(eActive?"★":"○"):"×"):""}</div>
        <div class="miniSideMain" style="text-align:right">
          <div class="miniSideName">${ef?ef.name:"-"} ${labels[i]}</div>
          <div class="miniSideMeta">${ef?`${attrLabel(ef.attr)} / HP ${Math.max(0,ef.currentHp)}`:"-"}</div>
        </div>
        <img src="${ef?ef.img:""}" alt="" onerror="this.style.opacity='.15'">
      </div>
    `;
    rows.appendChild(row);
  }
}
function drawStatusLines(){
  const svg=document.querySelector(".statusLines");
  const wrapEl=document.querySelector(".statusBoardWrap");
  if(!svg || !wrapEl || !battle) return;
  svg.innerHTML="";
  const wrap=wrapEl.getBoundingClientRect();
  battle.lineHistory.forEach(item=>{
    const from=document.querySelector(`.miniSideCard[data-side="player"][data-idx="${item.playerIdx}"]`);
    const to=document.querySelector(`.miniSideCard[data-side="enemy"][data-idx="${item.enemyIdx}"]`);
    if(!from || !to) return;
    const fr=from.getBoundingClientRect();
    const tr=to.getBoundingClientRect();
    const x1=fr.right-wrap.left, y1=fr.top+fr.height/2-wrap.top, x2=tr.left-wrap.left, y2=tr.top+tr.height/2-wrap.top;
    const line=document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1",x1); line.setAttribute("y1",y1); line.setAttribute("x2",x2); line.setAttribute("y2",y2);
    line.setAttribute("stroke",item.active?"rgba(255,255,255,.95)":"rgba(255,255,255,.35)");
    line.setAttribute("stroke-width",item.active?"3":"2");
    line.setAttribute("stroke-linecap","round");
    svg.appendChild(line);
  });
}
function getActivePlayer(){ return battle.playerTeam[battle.playerActiveIndex]; }
function getActiveEnemy(){ return battle.enemyTeam[battle.enemyActiveIndex]; }
function renderBattleHeader(useLastIfEnded=false){
  if(!battle) return;
  let p=getActivePlayer(), e=getActiveEnemy();
  if(useLastIfEnded){
    p=battle.lastPlayerShown||p;
    e=battle.lastEnemyShown||e;
  }

  document.getElementById("alivePlayer").textContent=`あなた 残り${teamAliveCount(battle.playerTeam)}`;
  document.getElementById("aliveEnemy").textContent=`敵 残り${teamAliveCount(battle.enemyTeam)}`;
  document.getElementById("turnInfo").textContent=`TURN ${battle.turn} / MATCH ${battle.matchCount}`;

  document.getElementById("playerName").textContent=p?p.name:"-";
  document.getElementById("playerRole").textContent=p?p.role:"-";
  document.getElementById("playerEquip").textContent=p?.equippedSkill?`装備技：${p.equippedSkill.name}`:"-";
  document.getElementById("enemyName").textContent=e?e.name:"-";
  document.getElementById("enemyRole").textContent=e?e.role:"-";
  document.getElementById("enemyEquip").textContent=e?.equippedSkill?`装備技：${e.equippedSkill.name}`:"-";

  setImg(document.getElementById("playerImg"),p);
  setImg(document.getElementById("enemyImg"),e);
  updateHpBar(document.getElementById("playerHp"),document.getElementById("playerHpText"),p);
  updateHpBar(document.getElementById("enemyHp"),document.getElementById("enemyHpText"),e);

  document.getElementById("playerCard").className="fighterCard "+(p?attrCardClass(p.attr):"none");
  document.getElementById("enemyCard").className="fighterCard "+(e?attrCardClass(e.attr):"none");

  if(p && e){
    renderBadges(document.getElementById("playerBadges"),p,matchupText(p,e));
    renderBadges(document.getElementById("enemyBadges"),e,matchupText(e,p));
  }else{
    document.getElementById("playerBadges").innerHTML="";
    document.getElementById("enemyBadges").innerHTML="";
  }

  drawStatusRows();
  drawStatusLines();
}
async function attackOnce(attacker,defender){
  const result=calcDamage(attacker,defender);
  if(result.evaded){ addLog(`${defender.name}は分身した。`); return; }
  if(result.missed){ addLog(`${attacker.name}は空振りした。`); return; }
  if(result.damage<=0){ addLog(`${attacker.name}の攻撃は当たらない。`); return; }

  defender.currentHp-=result.damage;
  defender.damageTaken+=result.damage;
  attacker.damageDealt+=result.damage;
  attacker.turns+=1;

  if(result.attrRate>1) addLog("属性有利。");
  if(result.attrRate<1) addLog("属性不利。");
  if(result.isCrit) addLog("クリティカル。");
  addLog(`${attacker.name}の攻撃。${defender.name}に ${result.damage} ダメージ。`);

  if(defender.id==="juzo" && defender.alive) defender.flags.counterReady=true;

  if(defender.currentHp<=0){
    defender.currentHp=0;
    defender.alive=false;
    attacker.wins+=1;
    addLog(`${defender.name}は倒れた。`);
    battle.lastPlayerShown=battle.playerActiveIndex>=0?battle.playerTeam[battle.playerActiveIndex]:battle.lastPlayerShown;
    battle.lastEnemyShown=battle.enemyActiveIndex>=0?battle.enemyTeam[battle.enemyActiveIndex]:battle.lastEnemyShown;
    await wait(speedMap[speedMode].ko);
  }
}
async function processTurn(){
  const p=getActivePlayer(), e=getActiveEnemy();
  if(!p || !e) return;
  battle.turn+=1;
  renderBattleHeader();

  const first=decideFirst(p,e);
  const second=first===p?e:p;
  p.flags.isFirstThisTurn=(first===p);
  e.flags.isFirstThisTurn=(first===e);

  await attackOnce(first,second);
  renderBattleHeader();
  await wait(speedMap[speedMode].afterHit);

  if(second.alive){
    await attackOnce(second,first);
    renderBattleHeader();
    await wait(speedMap[speedMode].afterHit);
  }

  p.flags.isFirstThisTurn=false;
  e.flags.isFirstThisTurn=false;

  if(p.alive){
    if(p.id==="ani") p.flags.aniBoost=Math.min(0.3,p.flags.aniBoost+0.1);
    const healText=healEndTurn(p);
    if(healText) addLog(healText);
  }
  if(e.alive){
    if(e.id==="ani") e.flags.aniBoost=Math.min(0.3,e.flags.aniBoost+0.1);
    const healText=healEndTurn(e);
    if(healText) addLog(healText);
  }
  renderBattleHeader();
}
function calcMvpScore(f){
  const hpRate=f.maxHp>0?(Math.max(0,f.currentHp)/f.maxHp):0;
  return f.wins*100+f.damageDealt+hpRate*50+f.matchWin*120+f.wins*80;
}
function calcMvp(teamArr){
  let best=teamArr[0], bestScore=-999999;
  for(const f of teamArr){
    const s=calcMvpScore(f);
    if(s>bestScore){ bestScore=s; best=f; }
  }
  return best;
}
function calcWorst(teamArr){
  let worst=teamArr[0];
  for(const f of teamArr){
    const score=f.wins*1000+f.damageDealt-f.damageTaken*0.1+f.matchWin*300;
    const worstScore=worst.wins*1000+worst.damageDealt-worst.damageTaken*0.1+worst.matchWin*300;
    if(score<worstScore) worst=f;
  }
  return worst;
}
function getVictoryLine(name){
  return {"デカブサ":"まあ勝った。","カンえもん":"初手で決めた。","パンパン":"たまたまだな。","キング":"仕留めた。","ゴリさん":"ふんばった。","カバオ":"まだ立ってる。","ナマケン":"やればできる。","ニセブサ":"似てるだけじゃない。","デカブサ兄":"当然だな。","トラさん":"分身しただけだ。","ジュウゾウ":"反撃完了。","ラテロウ":"速かっただろ。"}[name]||"勝った。";
}
function getLoseLine(name){
  return {"デカブサ":"今日はそういう日だ。","カンえもん":"初手は良かった。","パンパン":"暴れ足りない。","キング":"仕留めきれなかった。","ゴリさん":"受けきれなかった。","カバオ":"まだいけると思った。","ナマケン":"ちょっと遅かった。","ニセブサ":"本物じゃなかった。","デカブサ兄":"次は本気だ。","トラさん":"分身不足だ。","ジュウゾウ":"返しきれなかった。","ラテロウ":"速いだけじゃ足りない。"}[name]||"負けた。";
}
function buildSummary(){
  const playerAlive=teamAliveCount(battle.playerTeam);
  const enemyAlive=teamAliveCount(battle.enemyTeam);

  let playerWon;
  if(battleMode==="fixed"){
    const playerMatches=battle.playerTeam.reduce((s,f)=>s+f.matchWin,0);
    const enemyMatches=battle.enemyTeam.reduce((s,f)=>s+f.matchWin,0);
    playerWon=playerMatches>=enemyMatches;
  }else{
    playerWon=enemyAlive===0;
  }

  const mvp=playerWon?calcMvp(battle.playerTeam):calcMvp(battle.enemyTeam);
  const side=playerWon?"あなた":"敵";
  const yourMvp=calcMvp(battle.playerTeam);
  const yourWorst=calcWorst(battle.playerTeam);

  const lines=[];
  lines.push(playerWon?"勝ったな。":"並びだな。");
  lines.push("");
  lines.push(`モード：${battleMode==="survival"?"勝ち抜き":"対面固定"}`);
  lines.push("残り人数");
  lines.push(`あなた：${playerAlive}`);
  lines.push(`敵：${enemyAlive}`);
  lines.push("");
  lines.push("全体MVP");
  lines.push(`${mvp.name}（${side}側）`);
  lines.push(`勝利本数：${mvp.matchWin}`);
  lines.push(`撃破数：${mvp.wins}`);
  lines.push(`総ダメージ：${mvp.damageDealt}`);
  lines.push(`残HP：${Math.max(0,mvp.currentHp)}`);
  lines.push("");
  lines.push(`あなた側MVP：${yourMvp.name}`);
  lines.push(`あなた側で一番早く帰った：${yourWorst.name}`);
  lines.push("");
  lines.push("あなたの結果");
  battle.playerTeam.forEach(f=>{
    lines.push(`${f.name}：本勝利${f.matchWin} / 撃破${f.wins} / 与${f.damageDealt} / 被${f.damageTaken}`);
  });

  return {
    title:playerWon?"WIN":"LOSE",
    sub:playerWon?getVictoryLine(yourMvp.name):getLoseLine(yourWorst.name),
    text:lines.join("\n"),
    mvp
  };
}
function showMvpOverlay(summary){
  lastSummary=summary;
  document.getElementById("mvpImg").src=summary.mvp.img;
  document.getElementById("mvpImg").onerror=function(){this.style.opacity=".15"};
  document.getElementById("mvpName").textContent=summary.mvp.name;
  document.getElementById("mvpStats").textContent=`勝利本数 ${summary.mvp.matchWin} / 撃破 ${summary.mvp.wins}\n与ダメ ${summary.mvp.damageDealt} / 残HP ${Math.max(0,summary.mvp.currentHp)}`;
  document.getElementById("mvpLine").textContent=summary.mvp.mvpLine||"勝った。";
  document.getElementById("mvpOverlay").hidden=false;
  document.getElementById("resultViewBtn").hidden=false;
}
function closeMvpOverlay(){
  document.getElementById("mvpOverlay").hidden=true;
}
function openResultFromMvp(){
  closeMvpOverlay();
  goResult();
}
async function finishBattle(){
  battleRunning=false;
  battle.playerActiveIndex=-1;
  battle.enemyActiveIndex=-1;
  renderBattleHeader(true);
  const summary=buildSummary();
  showMvpOverlay(summary);
}
function aliveNext(teamArr,startIndex){
  for(let i=startIndex;i<teamArr.length;i++){
    if(teamArr[i].alive) return i;
  }
  return -1;
}
async function battleLoopSurvival(){
  addLog("対戦開始。");
  renderBattleHeader();
  await wait(speedMap[speedMode].intro);

  while(battleRunning){
    const p=getActivePlayer(), e=getActiveEnemy();
    if(!p || !e) break;

    battle.matchCount+=1;
    battle.turn=0;
    battle.lineHistory=[{playerIdx:battle.playerActiveIndex,enemyIdx:battle.enemyActiveIndex,active:true}];
    battle.lastPlayerShown=p;
    battle.lastEnemyShown=e;

    renderBattleHeader();
    addLog(`${orderLabel(p.orderIndex)} ${p.name} と ${orderLabel(e.orderIndex)} ${e.name} が向かい合った。`);
    await wait(speedMap[speedMode].intro);

    while(battleRunning && p.alive && e.alive){
      await processTurn();
      battle.lastPlayerShown=battle.playerTeam[battle.playerActiveIndex]||battle.lastPlayerShown;
      battle.lastEnemyShown=battle.enemyTeam[battle.enemyActiveIndex]||battle.lastEnemyShown;
    }

    if(!battleRunning) break;

    const winner=p.alive?p:e;
    winner.matchWin+=1;

    const nextP=aliveNext(battle.playerTeam,battle.playerActiveIndex);
    const nextE=aliveNext(battle.enemyTeam,battle.enemyActiveIndex);
    battle.playerActiveIndex=nextP;
    battle.enemyActiveIndex=nextE;
    battle.lineHistory=[];
    renderBattleHeader();

    if(nextP!==-1 && nextE!==-1){
      addLog(`${orderLabel(nextP)} ${battle.playerTeam[nextP].name} / ${orderLabel(nextE)} ${battle.enemyTeam[nextE].name} 登場。`);
      await wait(speedMap[speedMode].enter);
    }
    if(nextP===-1 || nextE===-1) break;
  }
  await finishBattle();
}
async function battleLoopFixed(){
  addLog("対面固定バトル開始。");
  renderBattleHeader();
  await wait(speedMap[speedMode].intro);

  for(let i=0;i<5 && battleRunning;i++){
    const p=battle.playerTeam[i], e=battle.enemyTeam[i];
    if(!p || !e) continue;

    battle.playerActiveIndex=i;
    battle.enemyActiveIndex=i;
    battle.turn=0;
    battle.matchCount+=1;
    battle.lineHistory=[{playerIdx:i,enemyIdx:i,active:true}];
    battle.lastPlayerShown=p;
    battle.lastEnemyShown=e;

    renderBattleHeader();
    addLog(`${orderLabel(i)}同士の対戦。 ${p.name} vs ${e.name}`);
    await wait(speedMap[speedMode].intro);

    while(battleRunning && p.alive && e.alive){
      await processTurn();
      battle.lastPlayerShown=battle.playerTeam[battle.playerActiveIndex]||battle.lastPlayerShown;
      battle.lastEnemyShown=battle.enemyTeam[battle.enemyActiveIndex]||battle.lastEnemyShown;
    }

    if(!battleRunning) break;

    if(p.alive && !e.alive){
      p.matchWin+=1;
      addLog(`${p.name} がこの本戦を取った。`);
    }else if(e.alive && !p.alive){
      e.matchWin+=1;
      addLog(`${e.name} がこの本戦を取った。`);
    }else{
      addLog("引き分け扱い。");
    }

    battle.lineHistory=[];
    renderBattleHeader();
    await wait(speedMap[speedMode].enter);
  }
  await finishBattle();
}
async function startBattle(){
  if(team.length!==5) return alert("5体必要");

  const enemyIds=makeEnemyTeam();
  battle={
    playerTeam:team.map((id,i)=>cloneFighter(getChar(id),"player",i)),
    enemyTeam:enemyIds.map((id,i)=>cloneFighter(getChar(id),"enemy",i)),
    playerActiveIndex:0,
    enemyActiveIndex:0,
    lineHistory:[{playerIdx:0,enemyIdx:0,active:true}],
    turn:0,
    matchCount:0,
    lastPlayerShown:null,
    lastEnemyShown:null
  };

  battleRunning=true;
  lastSummary=null;
  document.getElementById("mvpOverlay").hidden=true;
  document.getElementById("resultViewBtn").hidden=true;
  showOnlyScreen("screenBattle");
  document.getElementById("log").innerHTML="";
  renderBattleHeader();
  await wait(speedMap[speedMode].start);

  if(battleMode==="fixed") await battleLoopFixed();
  else await battleLoopSurvival();
}
function setSpeed(mult){
  const btns=document.querySelectorAll(".speedBtn");
  btns.forEach(b=>b.classList.remove("active"));
  if(mult===1){ speedMode="normal"; btns[0]?.classList.add("active"); }
  else if(mult===2){ speedMode="fast"; btns[1]?.classList.add("active"); }
  else { speedMode="turbo"; btns[2]?.classList.add("active"); }
}
function skipBattle(){ speedMode="turbo"; }

window.addEventListener("resize",()=>{ if(battle) drawStatusLines(); });

setBattleMode("survival");
goTitle();
renderAll();
initDeckUI();
</script>
