<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>デカブサ大戦</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}
body{
  display:flex;
  justify-content:center;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
[hidden]{display:none!important}

:root{
  --maxw:560px;
  --line:rgba(255,255,255,.12);
  --muted:rgba(255,255,255,.68);
  --panelGlow:0 8px 24px rgba(0,0,0,.35);
}

.app{
  width:100%;
  max-width:var(--maxw);
  min-height:100svh;
  padding:8px 8px 84px;
}
.screen{
  min-height:calc(100svh - 16px);
  display:flex;
  flex-direction:column;
}
.title{
  text-align:center;
  font-size:34px;
  font-weight:900;
  letter-spacing:.08em;
  margin-top:8px;
}
.sub{
  text-align:center;
  font-size:14px;
  color:var(--muted);
  margin-top:10px;
}
.center{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
.btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:15px 14px;
  font-size:18px;
  font-weight:900;
  background:#fff;
  color:#000;
}
.btn:active{transform:scale(.98)}
.btnGhost{
  width:100%;
  border:none;
  border-radius:14px;
  padding:15px 14px;
  font-size:18px;
  font-weight:900;
  background:#1f1f1f;
  color:#fff;
  border:1px solid var(--line);
}
.version{
  text-align:center;
  font-size:12px;
  opacity:.4;
  margin-top:12px;
}
.heroWrap{text-align:center}
.hero{
  width:min(76vw,310px);
  max-width:310px;
  opacity:.97;
  animation:float 4s ease-in-out infinite;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,.45));
}
.copy{
  text-align:center;
  font-size:16px;
  opacity:.85;
  margin-bottom:22px;
}
.titleFooter{padding-bottom:10px}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0)}
}

.topBar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.backBtn{
  width:auto;
  min-width:92px;
  padding:12px 14px;
  font-size:14px;
  border-radius:12px;
}
.row{
  display:flex;
  gap:8px;
}
.col{min-width:0}
.leftCol{flex:1.08}
.rightCol{flex:.92}

.panel{
  background:linear-gradient(180deg,#141414,#101010);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  box-shadow:var(--panelGlow);
}
.sectionTitle{
  font-size:18px;
  font-weight:900;
  margin:14px 0 10px;
}
.teamInfo{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

.attr-fire{background:rgba(255,110,110,.18)}
.attr-water{background:rgba(100,170,255,.18)}
.attr-grass{background:rgba(90,220,130,.18)}

.modeRow{
  display:flex;
  gap:8px;
  margin:10px 0 2px;
}
.modeBtn{
  flex:1;
  min-width:110px;
  border:none;
  border-radius:12px;
  padding:12px 10px;
  background:#242424;
  color:#fff;
  border:1px solid var(--line);
  font-size:13px;
  font-weight:900;
}
.modeBtn.active{
  background:#fff;
  color:#000;
}

/* 候補カード */
.pickGrid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.pickCardBig{
  border:1px solid rgba(255,255,255,.18);
  border-radius:18px;
  padding:8px 9px;
  background:#101010;
  position:relative;
  transition:transform .14s ease, box-shadow .2s ease, border-color .2s ease;
}
.pickCardBig.selected{
  border:2px solid #fff;
  box-shadow:0 0 10px rgba(255,255,255,.68), 0 0 22px rgba(255,255,255,.25);
}
.pickCardBig.tap{transform:scale(.985)}

.cardMain{
  display:grid;
  grid-template-columns:122px 1fr;
  gap:10px;
  align-items:stretch;
  min-height:148px;
}
.cardImgWrap{
  width:122px;
  min-height:148px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}
.cardImg{
  width:100%;
  height:144px;
  object-fit:contain;
  object-position:center bottom;
  filter:drop-shadow(0 8px 18px rgba(0,0,0,.45));
  display:block;
}
.cardInfo{
  display:flex;
  flex-direction:column;
  min-width:0;
  padding-top:2px;
}
.cardTopLine{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:8px;
}
.cardName{
  font-size:17px;
  font-weight:900;
  line-height:1.1;
}
.cardAttr{
  padding:4px 9px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.12);
  flex-shrink:0;
}
.cardRole{
  font-size:12px;
  opacity:.82;
  margin-top:2px;
  line-height:1.25;
}
.cardStats{
  font-size:12px;
  margin-top:5px;
  color:#ddd;
  line-height:1.25;
}
.roleRow{
  margin-top:6px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.roleTag{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:#232323;
  font-size:11px;
  font-weight:800;
  color:#f1f1f1;
  line-height:1;
}
.roleTag.type-attack{background:rgba(255,120,120,.12)}
.roleTag.type-tank{background:rgba(120,200,255,.12)}
.roleTag.type-speed{background:rgba(255,220,120,.12)}
.roleTag.type-balance{background:rgba(180,180,180,.12)}
.roleTag.type-finisher{background:rgba(200,120,255,.12)}
.roleTag.type-trick{background:rgba(120,255,200,.12)}
.cardSkill{
  font-size:12px;
  margin-top:7px;
  line-height:1.35;
  color:#f2f2f2;
}
.cardEquip{
  font-size:11px;
  margin-top:6px;
  color:#b8d7ff;
  line-height:1.35;
}
.cardButtons{
  margin-top:auto;
  display:flex;
  gap:6px;
  padding-top:6px;
}
.btnMain,.btnSub,.btnDetail,.btnEquip{
  flex:1;
  border:none;
  border-radius:10px;
  padding:9px 6px;
  font-size:12px;
  font-weight:900;
  min-height:40px;
}
.btnMain{background:#fff;color:#000}
.btnSub{background:#333;color:#fff}
.btnDetail{background:#555;color:#fff}
.btnEquip{background:#2b2b2b;color:#fff}

/* 並び */
.teamList{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.teamSlot{
  background:#1d1d1d;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  display:grid;
  grid-template-columns:42px 54px 1fr 58px;
  gap:10px;
  align-items:center;
}
.slotNum{
  width:42px;
  height:42px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#202020;
  border:1px solid var(--line);
  font-weight:900;
  font-size:14px;
}
.slotThumb{
  width:54px;
  height:54px;
  border-radius:12px;
  object-fit:cover;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.slotMain{min-width:0}
.slotName{
  font-size:15px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.slotMeta{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}
.slotEquip{
  font-size:10px;
  color:#b8d7ff;
  margin-top:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.slotEmpty{color:rgba(255,255,255,.35)}
.moveBtns{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.moveBtn{
  border:none;
  border-radius:10px;
  background:#2a2a2a;
  color:#fff;
  font-weight:900;
  padding:7px 0;
  border:1px solid var(--line);
  font-size:12px;
}
.moveBtn:disabled{opacity:.28}
.removeBtn{
  margin-top:6px;
  border:none;
  border-radius:10px;
  background:#1d1d1d;
  color:#fff;
  border:1px solid var(--line);
  padding:8px 0;
  font-size:12px;
  font-weight:900;
  width:100%;
}
.bottomActions{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.buildHint{
  margin-top:10px;
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  font-size:13px;
  line-height:1.65;
  white-space:pre-line;
}

/* マイデッキ */
.deckBox,.shareBox{
  margin-top:14px;
  padding:12px;
  border-radius:16px;
  background:#111;
  border:1px solid var(--line);
}
#deckList{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}
.deckSlot{
  flex:1;
  padding:10px;
  border-radius:12px;
  background:#222;
  text-align:center;
  cursor:pointer;
  border:2px solid transparent;
  font-size:12px;
  font-weight:900;
}
.deckSlot.active{
  border-color:#fff;
}
#deckName,#deckCode{
  width:100%;
  border:none;
  border-radius:12px;
  background:#222;
  color:#fff;
  padding:10px;
  font-size:12px;
}
#deckCode{
  min-height:86px;
  resize:vertical;
  line-height:1.5;
}
.deckBtns{
  display:flex;
  gap:8px;
  margin-top:8px;
}
.deckBtns button{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#333;
  color:#fff;
  font-size:12px;
  font-weight:900;
}
  /* 図鑑一覧 */
.dexList{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.dexRow{
  display:grid;
  grid-template-columns:56px 1fr auto;
  gap:10px;
  align-items:center;
  background:#1b1b1b;
  border:1px solid var(--line);
  border-radius:12px;
  padding:8px;
  cursor:pointer;
}
.dexThumb{
  width:56px;
  height:56px;
  object-fit:contain;
  border-radius:10px;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.dexName{
  font-size:14px;
  font-weight:900;
}
.dexMini{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}
.dexAttr{
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.12);
}

/* 図鑑詳細 */
.dexHero{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:190px;
}
.dexHero img{
  max-width:220px;
  max-height:180px;
  object-fit:contain;
  filter:drop-shadow(0 12px 28px rgba(0,0,0,.45));
}
.dexDetailName{
  font-size:26px;
  font-weight:900;
  text-align:center;
}
.dexDetailAttr{
  margin:8px auto 0;
  width:max-content;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.14);
}
.dexRole{
  text-align:center;
  font-size:14px;
  color:#ddd;
  margin-top:8px;
}
.dexStatsGrid{
  margin-top:14px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
.dexStat{
  background:#171717;
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
}
.dexStatLabel{
  font-size:11px;
  color:var(--muted);
}
.dexStatValue{
  font-size:18px;
  font-weight:900;
  margin-top:4px;
}
.dexBlock{
  margin-top:12px;
  background:#171717;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
}
.dexBlockTitle{
  font-size:13px;
  font-weight:900;
  margin-bottom:6px;
}
.dexText{
  font-size:13px;
  line-height:1.65;
  color:#eee;
  white-space:pre-line;
}

/* 装備技 */
.skillList{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.skillCard{
  background:#171717;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}
.skillCard.active{
  outline:2px solid rgba(255,255,255,.55);
}
.skillName{
  font-size:15px;
  font-weight:900;
}
.skillDesc{
  font-size:12px;
  line-height:1.55;
  color:#ddd;
  margin-top:6px;
}
.skillBtns{
  display:flex;
  gap:8px;
  margin-top:10px;
}

/* お試し相手選択 */
.testEnemyGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
.testEnemyCard{
  background:#161616;
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  text-align:center;
}
.testEnemyCard img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
  border-radius:12px;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.testEnemyName{
  font-size:14px;
  font-weight:900;
  margin-top:8px;
}
.testEnemyAttr{
  font-size:12px;
  color:#ddd;
  margin-top:2px;
}
.testEnemyBtn{
  margin-top:10px;
  width:100%;
  border:none;
  border-radius:12px;
  padding:12px 8px;
  background:#fff;
  color:#000;
  font-size:13px;
  font-weight:900;
}

/* 戦況メタ */
.battleMeta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.metaPill{
  padding:7px 10px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#171717;
  font-size:11px;
  color:#ddd;
}
.alivePill{font-weight:900}
.aliveGood{color:#b8ffd1}
.aliveBad{color:#ffc1c1}

/* 戦況表 */
.statusBoardWrap{
  position:relative;
  margin-bottom:12px;
}
.statusBoard{
  background:linear-gradient(180deg,#141414,#101010);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  box-shadow:var(--panelGlow);
  position:relative;
  z-index:1;
}
.statusLines{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:2;
}
.statusHead{
  display:grid;
  grid-template-columns:1fr 44px 1fr;
  gap:8px;
  align-items:center;
  margin-bottom:8px;
}
.statusHead .label{
  font-size:13px;
  font-weight:900;
  color:#ddd;
}
.statusHead .label.right{text-align:right}
.statusRows{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.statusRow{
  display:grid;
  grid-template-columns:1fr 44px 1fr;
  gap:8px;
  align-items:center;
}
.miniSideCard{
  background:#1a1a1a;
  border:1px solid var(--line);
  border-radius:12px;
  padding:8px;
  min-height:58px;
  display:grid;
  grid-template-columns:40px 1fr auto;
  gap:8px;
  align-items:center;
  position:relative;
}
.miniSideCard.right{grid-template-columns:auto 1fr 40px}
.miniSideCard.dead{
  opacity:.25;
  filter:grayscale(1);
}
.miniSideCard.active{
  outline:2px solid rgba(255,255,255,.55);
  box-shadow:0 0 0 3px rgba(255,255,255,.08);
}
.miniSideCard img{
  width:40px;
  height:40px;
  border-radius:10px;
  object-fit:cover;
  background:#0d0d0d;
  border:1px solid var(--line);
}
.miniSideCard.playerSide img{transform:scaleX(-1)}
.miniSideCard.enemySide img{transform:scaleX(1)}
.miniSideMain{min-width:0}
.miniSideName{
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.miniSideMeta{
  font-size:10px;
  color:var(--muted);
  margin-top:2px;
}
.miniSideBadge{
  font-size:11px;
  font-weight:900;
  color:#fff;
}
.boardVs{
  display:flex;
  align-items:center;
  justify-content:center;
}
.boardLink{
  width:100%;
  height:2px;
  background:rgba(255,255,255,.18);
  position:relative;
}
.boardLink.active{
  background:rgba(255,255,255,.75);
  box-shadow:0 0 10px rgba(255,255,255,.22);
}

/* バトル本体 */
.battleTop{
  display:grid;
  grid-template-columns:1fr 64px 1fr;
  gap:10px;
  align-items:stretch;
  margin-bottom:10px;
}
.sideLabel{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}
.vs{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:900;
  opacity:.95;
}
.fighterCard{
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  min-height:286px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:var(--panelGlow);
  position:relative;
  overflow:hidden;
}
.fighterCard.fire{
  background:
    radial-gradient(circle at 30% 20%, rgba(255,90,90,.20), transparent 42%),
    linear-gradient(180deg,#251313,#120d0d);
}
.fighterCard.water{
  background:
    radial-gradient(circle at 30% 20%, rgba(90,150,255,.20), transparent 42%),
    linear-gradient(180deg,#101a2a,#0c1018);
}
.fighterCard.grass{
  background:
    radial-gradient(circle at 30% 20%, rgba(90,220,130,.18), transparent 42%),
    linear-gradient(180deg,#112317,#0b120d);
}
.fighterCard.none{
  background:linear-gradient(180deg,#171717,#101010);
}
.fighterHeader{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:0;
  padding-left:8px;
}
#enemyCard .fighterHeader,
#testEnemyCardBox .fighterHeader{
  padding-left:0;
  padding-right:8px;
}
.fighterBadges{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.fighterBadges.right{justify-content:flex-end}
.infoBadge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.08);
  font-size:11px;
  font-weight:900;
}
.badge-attr-fire{background:rgba(255,123,123,.12)}
.badge-attr-water{background:rgba(115,169,255,.12)}
.badge-attr-grass{background:rgba(100,220,130,.12)}
.badge-good{background:rgba(120,225,160,.16);color:#b8ffd1}
.badge-bad{background:rgba(255,127,127,.16);color:#ffc1c1}
.badge-even{background:rgba(255,255,255,.08);color:#eee}
.fighterName{
  font-size:20px;
  font-weight:900;
  line-height:1.1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.fighterRole{
  font-size:14px;
  color:#b8c8ff;
  line-height:1.2;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.fighterEquip{
  font-size:11px;
  color:#d7e6ff;
  line-height:1.35;
}
.fighterBody{
  flex:1;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
  min-height:140px;
  padding-bottom:6px;
}
.fighterVisual{
  width:150px;
  height:140px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
}
.fighterImg{
  max-width:100%;
  max-height:140px;
  object-fit:contain;
  filter:drop-shadow(0 8px 18px rgba(0,0,0,.45));
}
.fighterVisual.player .fighterImg{transform:scaleX(-1)}
.fighterVisual.enemy .fighterImg{transform:scaleX(1)}
  .fighterVisual.attackForward{animation:attackForwardPlayer .22s ease}
.fighterVisual.enemy.attackForward{animation:attackForwardEnemy .22s ease}
@keyframes attackForwardPlayer{
  0%{transform:translateX(0)}
  45%{transform:translateX(18px) scale(1.04)}
  100%{transform:translateX(0)}
}
@keyframes attackForwardEnemy{
  0%{transform:translateX(0)}
  45%{transform:translateX(-18px) scale(1.04)}
  100%{transform:translateX(0)}
}

.hpWrap{margin-top:8px}
.hpRow{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-bottom:5px;
}
.hpBar{
  width:100%;
  height:12px;
  background:#292929;
  border-radius:999px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
}
.hpFill{
  height:100%;
  width:100%;
  background:#fff;
  transition:width .28s ease;
}
.hpFill.low{background:#ff7b7b}
.hpFill.mid{background:#ffd24d}
.hpFill.high{background:#77e0a0}

.liveTicker{
  margin:4px 0 10px;
  padding:14px 14px;
  border-radius:14px;
  background:linear-gradient(180deg,#181818,#111);
  border:1px solid rgba(255,255,255,.12);
  font-size:17px;
  font-weight:900;
  line-height:1.45;
  min-height:56px;
  display:flex;
  align-items:center;
  box-shadow:0 8px 24px rgba(0,0,0,.28);
}
.battleBubble{
  position:absolute;
  top:-4px;
  max-width:120px;
  padding:8px 10px;
  border-radius:12px;
  background:rgba(255,255,255,.96);
  color:#111;
  font-size:12px;
  font-weight:900;
  line-height:1.35;
  box-shadow:0 6px 18px rgba(0,0,0,.28);
  z-index:3;
  animation:bubblePop .45s ease;
}
.battleBubble.left{left:-2px}
.battleBubble.right{right:-2px}
.battleBubble.left::after{
  content:"";
  position:absolute;
  left:18px;
  bottom:-8px;
  border-width:8px 7px 0 7px;
  border-style:solid;
  border-color:rgba(255,255,255,.96) transparent transparent transparent;
}
.battleBubble.right::after{
  content:"";
  position:absolute;
  right:18px;
  bottom:-8px;
  border-width:8px 7px 0 7px;
  border-style:solid;
  border-color:rgba(255,255,255,.96) transparent transparent transparent;
}
@keyframes bubblePop{
  0%{opacity:0;transform:translateY(6px) scale(.92)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.fighterCard.hit{animation:cardHitShake .22s ease}
.fighterCard.hit-enemy{animation:cardHitShakeEnemy .22s ease}
.fighterCard.flash::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,.28);
  pointer-events:none;
  animation:cardHitFlash .22s ease;
}
.fighterCard.koFaded{
  opacity:.58;
  filter:grayscale(.35);
  transition:opacity .18s ease, filter .18s ease;
}
@keyframes cardHitShake{
  0%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(7px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(3px)}
  100%{transform:translateX(0)}
}
@keyframes cardHitShakeEnemy{
  0%{transform:translateX(0)}
  20%{transform:translateX(8px)}
  40%{transform:translateX(-7px)}
  60%{transform:translateX(5px)}
  80%{transform:translateX(-3px)}
  100%{transform:translateX(0)}
}
@keyframes cardHitFlash{
  0%{opacity:0}
  25%{opacity:1}
  100%{opacity:0}
}
.hpBar.hitbar{
  box-shadow:0 0 0 2px rgba(255,255,255,.12), 0 0 16px rgba(255,255,255,.22);
}
.damageText{
  position:absolute;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  font-size:24px;
  font-weight:900;
  color:#fff;
  text-shadow:0 2px 10px rgba(0,0,0,.6);
  pointer-events:none;
  z-index:4;
  animation:damagePop .7s ease forwards;
}
.damageText.crit{color:#ffd95e}
.damageText.adv{
  color:#ff7b7b;
  text-shadow:0 0 10px rgba(255,0,0,.45);
}
.damageText.dis{
  color:#6db5ff;
  text-shadow:0 0 10px rgba(50,120,255,.45);
}
@keyframes damagePop{
  0%{opacity:0;transform:translateX(-50%) translateY(10px) scale(.7)}
  25%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  100%{opacity:0;transform:translateX(-50%) translateY(-24px) scale(1.05)}
}
.flashMsg{
  position:sticky;
  top:0;
  z-index:5;
  margin-bottom:10px;
  text-align:center;
  font-size:18px;
  font-weight:900;
  padding:10px 12px;
  border-radius:14px;
  background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.06));
  border:1px solid rgba(255,255,255,.2);
  opacity:0;
  transform:translateY(-6px) scale(.98);
  transition:.18s ease;
  pointer-events:none;
}
.flashMsg.show{
  opacity:1;
  transform:translateY(0) scale(1);
}
.logPanel{
  flex:1;
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  overflow:auto;
  min-height:210px;
  max-height:30svh;
}
.logLine{
  font-size:13px;
  line-height:1.65;
  padding:4px 0;
  border-bottom:1px dashed rgba(255,255,255,.06);
}
.battleActions{
  margin-top:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.resultTitle{
  font-size:22px;
  font-weight:900;
  text-align:center;
  margin:8px 0 4px;
}
.resultSub{
  text-align:center;
  color:var(--muted);
  font-size:13px;
  margin-bottom:8px;
}
.summaryCard{
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  line-height:1.75;
  font-size:13px;
  white-space:pre-line;
}
.speedRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.speedBtn{
  flex:1;
  min-width:84px;
  border:none;
  border-radius:12px;
  padding:10px 8px;
  background:#242424;
  color:#fff;
  border:1px solid var(--line);
  font-size:12px;
  font-weight:900;
}
.speedBtn.active{
  background:#fff;
  color:#000;
}
.mvpPanel{
  background:linear-gradient(180deg,#181818,#101010);
  border:1px solid rgba(255,255,255,.16);
  border-radius:18px;
  padding:18px 14px;
  text-align:center;
  box-shadow:0 8px 28px rgba(0,0,0,.38);
  overflow:hidden;
  position:relative;
}
.mvpPanel.show{animation:mvpAppear .42s ease}
@keyframes mvpAppear{
  0%{opacity:0; transform:scale(.94) translateY(10px)}
  100%{opacity:1; transform:scale(1) translateY(0)}
}
.mvpCrown{
  font-size:14px;
  font-weight:900;
  color:#ffd95e;
  letter-spacing:.08em;
}
.mvpImageWrap{
  min-height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:10px;
}
.mvpImg{
  max-width:240px;
  max-height:180px;
  object-fit:contain;
  filter:drop-shadow(0 12px 28px rgba(0,0,0,.45));
  animation:mvpFloat 2.4s ease-in-out infinite;
}
@keyframes mvpFloat{
  0%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
  100%{transform:translateY(0)}
}
.mvpName{
  font-size:28px;
  font-weight:900;
  margin-top:4px;
}
.mvpStats{
  margin-top:6px;
  font-size:13px;
  line-height:1.6;
  color:#ddd;
  white-space:pre-line;
}
.mvpLine{
  margin-top:8px;
  font-size:15px;
  font-weight:900;
}
.replayPanel{
  background:#111;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  font-size:13px;
  line-height:1.7;
  white-space:pre-line;
}

@media (max-width:520px){
  .title{font-size:31px}
  .row{flex-direction:column}
  .statusHead{grid-template-columns:1fr 34px 1fr;gap:6px}
  .statusRow{grid-template-columns:1fr 34px 1fr;gap:6px}
  .miniSideCard{
    min-height:54px;
    grid-template-columns:36px 1fr auto;
    padding:7px;
  }
  .miniSideCard.right{grid-template-columns:auto 1fr 36px}
  .miniSideCard img{
    width:36px;
    height:36px;
  }
  .battleTop{grid-template-columns:1fr 48px 1fr;gap:8px}
  .vs{font-size:22px}
  .fighterCard{min-height:252px;padding:12px}
  .fighterName{font-size:16px}
  .fighterBody{min-height:128px;padding-bottom:4px}
  .fighterVisual{width:128px;height:128px}
  .fighterImg{max-width:128px;max-height:128px}
}
</style>
</head>
<body>
<div class="app">

<section id="screenTitle" class="screen">
  <div class="title">デカブサ大戦</div>
  <div class="sub">5対5 団体オートバトル</div>
  <div class="center">
    <div class="heroWrap">
      <img class="hero" src="./dekabusa_title.png" alt="デカブサ大戦" onerror="this.src='./dekabusa.png';this.onerror=null;">
    </div>
  </div>
  <div class="titleFooter">
    <div class="copy">並びだけ決めろ</div>
    <button class="btn" onclick="goBuild()">START</button>
    <div class="version">ver 10.1</div>
  </div>
</section>

<section id="screenBuild" class="screen" hidden>
  <div class="topBar">
    <button class="btn btnGhost backBtn" onclick="goTitle()">戻る</button>
    <div style="text-align:right">
      <div style="font-size:18px;font-weight:900">好きな順に並べろ。</div>
      <div class="teamInfo">5体まで選択可能</div>
    </div>
  </div>

  <div class="panel" style="margin-bottom:10px">
    <div class="sectionTitle" style="margin-top:0">バトルモード</div>
    <div class="modeRow">
      <button id="modeSurvivalBtn" class="modeBtn active" onclick="setBattleMode('survival')">勝ち抜き</button>
      <button id="modeFixedBtn" class="modeBtn" onclick="setBattleMode('fixed')">対面固定</button>
    </div>
    <div id="modeHint" class="teamInfo">勝ったキャラが残って次と戦う</div>
  </div>

  <div class="row">
    <div class="col leftCol">
      <div class="panel">
        <div class="sectionTitle">候補キャラ</div>
        <div id="pickGrid" class="pickGrid"></div>
      </div>
    </div>

    <div class="col rightCol">
      <div class="panel">
        <div class="sectionTitle">現在の並び</div>
        <div class="teamInfo">先鋒 → 次鋒 → 中堅 → 副将 → 大将</div>
        <div id="teamList" class="teamList"></div>

        <div class="bottomActions">
          <button id="confirmBtn" class="btn" onclick="startBattle()" disabled>この並びでいく</button>
          <button class="btn btnGhost" onclick="fillRandom()">ランダムで埋める</button>
          <button class="btn btnGhost" onclick="clearTeam()">全て外す</button>
          <button class="btn btnGhost" onclick="goDexList()">キャラ図鑑</button>
        </div>

        <div id="buildHint" class="buildHint">並び特徴をここに表示</div>
      </div>

      <div class="deckBox">
        <div class="sectionTitle" style="margin-top:0">マイデッキ</div>
        <div id="deckList"></div>
        <input id="deckName" placeholder="デッキ名">
        <div class="deckBtns">
          <button onclick="saveDeck()">保存</button>
          <button onclick="loadDeck()">読み込み</button>
          <button onclick="deleteDeck()">削除</button>
        </div>
      </div>

      <div class="shareBox">
        <div class="sectionTitle" style="margin-top:0">デッキ共有</div>
        <textarea id="deckCode" placeholder="ここにデッキコードを表示 / 貼り付け"></textarea>
        <div class="deckBtns">
          <button onclick="exportDeckCode()">コード作成</button>
          <button onclick="copyDeckCode()">コピー</button>
          <button onclick="importDeckCode()">読み込み</button>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- 図鑑一覧 -->
<section id="screenDexList" class="screen" hidden>
  <div class="topBar">
    <button class="btn btnGhost backBtn" onclick="goBuild()">戻る</button>
    <div style="text-align:right">
      <div style="font-size:18px;font-weight:900">キャラ図鑑</div>
    </div>
  </div>
  <div class="panel">
    <div id="dexList" class="dexList"></div>
  </div>
</section>

<!-- 図鑑詳細 -->
<section id="screenDexDetail" class="screen" hidden>
  <div class="topBar">
    <button class="btn btnGhost backBtn" onclick="goDexList()">戻る</button>
  </div>

  <div class="panel">
    <div class="dexHero">
      <img id="dexImg">
    </div>
    <div id="dexName" class="dexDetailName"></div>
    <div id="dexAttr" class="dexDetailAttr"></div>
    <div id="dexRole" class="dexRole"></div>

    <div id="dexStats" class="dexStatsGrid"></div>

    <div class="dexBlock">
      <div class="dexBlockTitle">スキル</div>
      <div id="dexSkill" class="dexText"></div>
    </div>

    <div class="dexBlock">
      <div class="dexBlockTitle">説明</div>
      <div id="dexDesc" class="dexText"></div>
    </div>
  </div>
</section>

<!-- お試し敵選択 -->
<section id="screenTestEnemy" class="screen" hidden>
  <div class="topBar">
    <button class="btn btnGhost backBtn" onclick="goBuild()">戻る</button>
    <div style="text-align:right">
      <div style="font-size:18px;font-weight:900">対戦相手選択</div>
    </div>
  </div>

  <div class="panel">
    <div id="testEnemyGrid" class="testEnemyGrid"></div>
  </div>
</section>

<!-- バトル画面 -->
<section id="screenBattle" class="screen" hidden>

  <div id="flashMsg" class="flashMsg"></div>

  <div class="battleMeta">
    <div id="alivePlayer" class="metaPill alivePill aliveGood"></div>
    <div id="aliveEnemy" class="metaPill alivePill aliveBad"></div>
    <div id="turnInfo" class="metaPill"></div>
  </div>

  <!-- 上の状況一覧 -->
  <div class="statusBoardWrap">
    <div class="statusBoard">
      <div class="statusHead">
        <div class="label">自分</div>
        <div></div>
        <div class="label right">相手</div>
      </div>
      <div id="statusRows" class="statusRows"></div>
    </div>
    <svg class="statusLines"></svg>
  </div>

  <!-- メイン対戦 -->
  <div class="battleTop">

    <!-- プレイヤー -->
    <div id="playerCard" class="fighterCard none">
      <div class="fighterHeader">
        <div class="fighterBadges" id="playerBadges"></div>
        <div id="playerName" class="fighterName"></div>
        <div id="playerRole" class="fighterRole"></div>
        <div id="playerEquip" class="fighterEquip"></div>
      </div>

      <div class="fighterBody">
        <div id="playerVisual" class="fighterVisual player">
          <img id="playerImg" class="fighterImg">
        </div>
      </div>

      <div class="hpWrap">
        <div class="hpRow">
          <span>HP</span>
          <span id="playerHpText"></span>
        </div>
        <div class="hpBar">
          <div id="playerHp" class="hpFill"></div>
        </div>
      </div>
    </div>

    <div class="vs">VS</div>

    <!-- 敵 -->
    <div id="enemyCard" class="fighterCard none">
      <div class="fighterHeader">
        <div class="fighterBadges right" id="enemyBadges"></div>
        <div id="enemyName" class="fighterName" style="text-align:right"></div>
        <div id="enemyRole" class="fighterRole" style="text-align:right"></div>
        <div id="enemyEquip" class="fighterEquip" style="text-align:right"></div>
      </div>

      <div class="fighterBody">
        <div id="enemyVisual" class="fighterVisual enemy">
          <img id="enemyImg" class="fighterImg">
        </div>
      </div>

      <div class="hpWrap">
        <div class="hpRow">
          <span id="enemyHpText"></span>
          <span>HP</span>
        </div>
        <div class="hpBar">
          <div id="enemyHp" class="hpFill"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- ログ -->
  <div id="log" class="logPanel"></div>

  <!-- 操作 -->
  <div class="battleActions">
    <div class="speedRow">
      <button class="speedBtn active" onclick="setSpeed(1)">等速</button>
      <button class="speedBtn" onclick="setSpeed(2)">2倍</button>
      <button class="speedBtn" onclick="setSpeed(4)">4倍</button>
    </div>
    <button class="btn btnGhost" onclick="skipBattle()">スキップ</button>
  </div>

</section>

<!-- リザルト -->
<section id="screenResult" class="screen" hidden>

  <div class="resultTitle" id="resultTitle"></div>
  <div class="resultSub" id="resultSub"></div>

  <!-- MVP -->
  <div id="mvpPanel" class="mvpPanel">
    <div class="mvpCrown">MVP</div>
    <div class="mvpImageWrap">
      <img id="mvpImg" class="mvpImg">
    </div>
    <div id="mvpName" class="mvpName"></div>
    <div id="mvpStats" class="mvpStats"></div>
    <div id="mvpLine" class="mvpLine"></div>
  </div>

  <div id="summary" class="summaryCard"></div>

  <div class="battleActions">
    <button class="btn" onclick="goBuild()">もう一度</button>
    <button class="btn btnGhost" onclick="goTitle()">タイトルへ</button>
  </div>

</section>

</div>

<script src="script.js"></script>
</body>
</html>
