<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>デカブサ大戦</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;text-align:center}
.btn{padding:12px 20px;border:none;border-radius:10px;font-weight:bold}
.mvpModal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<h1>デカブサ大戦</h1>
<button class="btn" onclick="start()">START</button>

<div id="mvpModal" class="mvpModal" hidden>
  <div>
    <h2>MVP</h2>
    <div id="mvpName"></div>
    <button class="btn" onclick="closeMVP()">OK</button>
  </div>
</div>

<script>
function start(){
  document.getElementById("mvpName").textContent="キング";
  document.getElementById("mvpModal").hidden=false;
}
function closeMVP(){
  document.getElementById("mvpModal").hidden=true;
}
</script>

</body>
</html>
